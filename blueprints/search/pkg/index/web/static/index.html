<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenIndex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'system-ui', 'sans-serif'],
            mono: ['"Geist Mono"', 'monospace'],
          },
          borderRadius: {
            DEFAULT: '0',
            sm: '0',
            md: '0',
            lg: '0',
            xl: '0',
            full: '0',
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --panel-soft: #ffffff;
      --border: #d4d4d8;
      --text: #09090b;
      --text-soft: #52525b;
      --accent: #09090b;
      --accent-soft: #3f3f46;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: none;
    }
    html.dark {
      --bg: #0a0a0a;
      --bg-soft: #0a0a0a;
      --panel: #0a0a0a;
      --panel-soft: #0a0a0a;
      --border: #27272a;
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --accent: #f3f4f6;
      --accent-soft: #d1d5db;
      --success: #22c55e;
      --danger: #f87171;
      --shadow: none;
    }
    * {
      border-radius: 0 !important;
      border-color: var(--border);
    }
    body {
      color: var(--text);
      background: var(--bg);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .anim-fade-up {
      animation: fadeUp 0.25s ease-out forwards;
      opacity: 0;
    }
    .anim-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
      opacity: 0;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(113,113,122,0.26); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(113,113,122,0.4); }
    mark { background: rgba(250, 204, 21, 0.15); color: inherit; padding: 0 2px; }
    .light mark { background: rgba(250, 204, 21, 0.25); }
    .prose pre {
      border-radius: 0 !important;
      border: 1px solid var(--border);
      background: transparent;
    }
    .prose code { color: var(--text); }
    .prose blockquote { border-left-color: var(--border); color: var(--text-soft); }
    .prose table th, .prose table td, .prose hr { border-color: var(--border); }
    .prose img { border-radius: 0 !important; }
    .result-item { transition: background 0.15s ease, border-color 0.15s ease; border: 1px solid transparent; }
    .result-item:hover { background: transparent; border-color: var(--accent); }
    .tab-active { color: var(--accent); border-bottom: 1px solid var(--accent); }
    .tab-inactive { color: var(--text-soft); border-bottom: 1px solid transparent; }
    .tab-inactive:hover { color: var(--text); }
    .shard-active { color: var(--accent); font-weight: 500; }
    .shard-item { color: var(--text-soft); transition: color 0.1s; }
    .shard-item:hover { color: var(--text); }
    .file-row { transition: background 0.1s; border: 1px solid transparent; }
    .file-row:hover { background: transparent; border-color: var(--accent); }
    .progress-track {
      width: 100%;
      height: 6px;
      background: transparent;
      border: 1px solid var(--border);
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    .dark .progress-fill { background: var(--accent); }
    .step-card {
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1rem;
      background: var(--panel);
      box-shadow: none;
    }
    .surface {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: none;
    }
    .surface-soft {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      box-shadow: none;
    }
    .ui-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all 0.12s ease;
    }
    .ui-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
    .ui-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .ui-btn-primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .ui-btn-primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); color: #fff; }
    .ui-btn-danger { border-color: rgba(220, 38, 38, 0.4); color: var(--danger); }
    .ui-btn-danger:hover { background: transparent; border-color: var(--danger); }
    .ui-input, .ui-select {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }
    .ui-input:focus, .ui-select:focus {
      outline: none;
      border-color: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent-soft);
    }
    .ui-input::placeholder { color: var(--text-soft); }
    .ui-subtle { color: var(--text-soft); }
    .ui-table th { color: var(--text-soft); font-weight: 400; }
    .ui-table thead { background: transparent; }
    .ui-table td, .ui-table th { border-bottom: 1px solid var(--border); }
    .ui-table tbody tr:last-child td { border-bottom: 0; }
    .ui-table tbody tr:hover { background: transparent; }
    .page-shell { padding-top: 2rem; padding-bottom: 2rem; }
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .page-title { font-size: 1.6rem; line-height: 1.9rem; font-weight: 600; letter-spacing: -0.02em; }
    .meta-line { font-size: 11px; line-height: 1.25rem; font-family: "Geist Mono", monospace; color: var(--text-soft); }
    .ui-link { color: var(--text-soft); transition: color 0.12s ease; }
    .ui-link:hover { color: var(--text); }
    .ui-chip {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.5rem;
      font-size: 10px;
      line-height: 1;
      font-family: "Geist Mono", monospace;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
    }
    .ui-chip-ok { border-color: rgba(22, 163, 74, 0.5); color: #15803d; background: transparent; }
    .dark .ui-chip-ok { border-color: rgba(34, 197, 94, 0.6); color: #86efac; background: transparent; }
    .ui-chip-off { color: var(--text-soft); }
    .ui-empty {
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-soft);
      padding: 1rem;
      font-size: 12px;
      font-family: "Geist Mono", monospace;
    }
    .ui-border-r { border-right: 1px solid var(--border); }
    .ov-donut {
      width: 120px; height: 120px;
      border-radius: 50% !important;
      position: relative;
    }
    .ov-donut-hole {
      position: absolute; inset: 20%; border-radius: 50% !important;
      background: var(--panel);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }
    .ov-stacked { display: flex; height: 20px; border: 1px solid var(--border); overflow: hidden; }
    .ov-stacked-seg { height: 100%; transition: width 0.4s ease; min-width: 1px; }
    .ov-pipeline-step { flex: 1; min-width: 0; }
    .ov-pipeline-arrow {
      width: 24px; display: flex; align-items: center; justify-content: center;
      color: var(--text-soft); font-size: 14px; flex-shrink: 0;
    }
    .ov-legend-dot { width: 8px; height: 8px; flex-shrink: 0; }
    .ov-c1 { background: var(--accent); }
    .ov-c2 { background: #6366f1; }
    .ov-c3 { background: #f59e0b; }
    .ov-c4 { background: #10b981; }
    .ov-c5 { background: #ef4444; }
    .ov-c6 { background: #8b5cf6; }
    .light .ov-c1 { background: #18181b; }
    .light .ov-c2 { background: #4f46e5; }
    .light .ov-c3 { background: #d97706; }
    .light .ov-c4 { background: #059669; }
    .light .ov-c5 { background: #dc2626; }
    .light .ov-c6 { background: #7c3aed; }
    .ui-kbd {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
      padding: 0 0.35rem;
      font-size: 10px;
      font-family: "Geist Mono", monospace;
    }
    .ui-skeleton { border: 1px solid var(--border); background: var(--border); }
    .app-header { background: var(--bg-soft); }
    .theme-toggle { color: var(--text-soft); transition: color 0.12s ease; }
    .theme-toggle:hover { color: var(--text); }
    .status-running { color: #2563eb; }
    .status-completed { color: #16a34a; }
    .status-failed { color: #dc2626; }
    .status-cancelled, .status-queued, .status-default { color: var(--text-soft); }
    .dark .status-running { color: #93c5fd; }
    .dark .status-completed { color: #86efac; }
    .dark .status-failed { color: #fca5a5; }
    #main-nav {
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    #main-nav::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="antialiased min-h-screen font-sans">
  <div id="app">
    <header class="sticky top-0 z-50 app-header">
      <div class="flex items-center min-h-[3.5rem] px-4 md:px-6 gap-4 md:gap-6 flex-wrap md:flex-nowrap py-2">
        <a href="#/" class="flex items-center gap-1.5 text-sm font-medium tracking-tight shrink-0 hover:opacity-70 transition-opacity">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/><circle cx="19" cy="19" r="3"/><path d="m21.5 21.5-1-1"/></svg>
          OpenIndex
        </a>
        <div id="header-search" class="flex-1 hidden items-center gap-2">
          <input id="header-search-input" type="text"
            placeholder="What are you looking for?"
            class="ui-input flex-1 h-8 px-2 text-sm"
            onkeydown="if(event.key==='Enter')doSearch(this.value)">
          <select id="header-search-engine"
            class="ui-select h-8 text-xs px-2"
            onchange="applySearchEngine(this.value)">
          </select>
        </div>
        <nav id="main-nav" class="flex items-center gap-4 ml-auto shrink min-w-0">
          <a href="#/" data-tab="overview" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Overview</a>
          <a href="#/search" data-tab="search" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Search</a>
          <a href="#/browse" data-tab="browse" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Browse</a>
          <a href="#/warc" data-tab="warc" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">WARC</a>
          <a href="#/jobs" data-tab="jobs" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Jobs</a>
          <span id="header-status" class="hidden items-center gap-1.5 text-[11px] font-mono ui-subtle whitespace-nowrap cursor-default">
            <span id="header-status-dot" class="inline-block w-1.5 h-1.5" style="border-radius:50%!important;background:var(--success)"></span>
            <span id="header-status-text"></span>
          </span>
          <button onclick="toggleTheme()" class="theme-toggle" title="Toggle theme">
            <svg id="icon-sun" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg id="icon-moon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
        </nav>
      </div>
    </header>
    <main id="main" class="max-w-6xl mx-auto px-4 md:px-6"></main>
  </div>

<script>
// Injected by server — "dashboard" or "search"
const MODE = "__SERVER_MODE__";
const isDashboard = MODE === 'dashboard';
const DEFAULT_ENGINE = "__DEFAULT_ENGINE__";
</script>
<script src="/static/js/state.js"></script>
<script src="/static/js/websocket.js"></script>
<script src="/static/js/router.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/overview.js"></script>
<script src="/static/js/jobs.js"></script>
<script src="/static/js/search.js"></script>
<script src="/static/js/warc.js"></script>
<script src="/static/js/browse.js"></script>
<script src="/static/js/doc.js"></script>
<script src="/static/js/init.js"></script>

</body>
</html>
