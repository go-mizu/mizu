            sans: ['Geist', 'system-ui', 'sans-serif'],

  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --panel-soft: #ffffff;
      --border: #d4d4d8;
      --text: #09090b;
      --text-soft: #52525b;
      --accent: #09090b;
      --accent-soft: #3f3f46;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: none;
    }
    html.dark {
      --bg: #0a0a0a;
      --bg-soft: #0a0a0a;
      --panel: #0a0a0a;
      --panel-soft: #0a0a0a;
      --border: #27272a;
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --accent: #f3f4f6;
      --accent-soft: #d1d5db;

      border-color: var(--border);
    }
    body {

      background: var(--bg);
    }

      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {

      to { opacity: 1; }
    }
    .anim-fade-up {
      animation: fadeUp 0.25s ease-out forwards;
      opacity: 0;
    }
    .anim-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
      opacity: 0;
    }

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(113,113,122,0.26); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(113,113,122,0.4); }
    mark { background: rgba(250, 204, 21, 0.15); color: inherit; padding: 0 2px; }
    .light mark { background: rgba(250, 204, 21, 0.25); }

      border-radius: 0 !important;

    .file-row { transition: background 0.1s; border: 1px solid transparent; }

      border: 1px solid var(--border);

    .ov-stacked-seg { height: 100%; transition: width 0.4s ease; min-width: 1px; }
    .ov-pipeline-step { flex: 1; min-width: 0; }
    .ov-pipeline-arrow {
      width: 24px; display: flex; align-items: center; justify-content: center;

    .light .ov-c2 { background: #4f46e5; }
    .light .ov-c3 { background: #d97706; }
    .light .ov-c4 { background: #059669; }
    .light .ov-c5 { background: #dc2626; }
    .light .ov-c6 { background: #7c3aed; }
    .ui-kbd {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
      padding: 0 0.35rem;

    .app-header { border-bottom: 1px solid var(--border); background: var(--bg-soft); }
    .theme-toggle { color: var(--text-soft); transition: color 0.12s ease; }
    .theme-toggle:hover { color: var(--text); }
    .status-running { color: #2563eb; }
    .status-completed { color: #16a34a; }

    #main-nav {
      max-width: 100%;

<body class="antialiased min-h-screen font-sans">
  <div id="app">
    <header class="sticky top-0 z-50 app-header">
      <div class="max-w-6xl mx-auto flex items-center min-h-[3.5rem] px-4 md:px-6 gap-4 md:gap-6 flex-wrap md:flex-nowrap py-2">

          <a href="#/warc" data-tab="warc" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">WARC</a>

          <button id="header-meta-refresh" onclick="refreshDashboardMeta(false)" class="hidden ui-btn px-2 py-1 text-[11px] font-mono ui-subtle">Refresh Meta</button>
          <span id="header-meta" class="hidden text-[11px] font-mono ui-subtle whitespace-nowrap"></span>
          <button onclick="toggleTheme()" class="theme-toggle" title="Toggle theme">
            <svg id="icon-sun" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg id="icon-moon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
        </nav>
      </div>
    </header>
    <main id="main" class="max-w-6xl mx-auto px-4 md:px-6"></main>
  </div>

<script>
// ===================================================================
// Mode: injected by server — "dashboard" or "search"
// ===================================================================
const MODE = "__SERVER_MODE__";
const isDashboard = MODE === 'dashboard';
const DEFAULT_ENGINE = "__DEFAULT_ENGINE__";

// ===================================================================
// State
// ===================================================================
const state = {
  query: '',
  searchEngine: '',
  results: null,
  stats: null,
  loading: false,
  currentPage: '',
  browseShards: null,
  browseFiles: null,
  browseShard: '',
  doc: null,
  theme: localStorage.getItem('fts-theme') || 'dark',
  overview: null,
  overviewLoadedAt: 0,
  metaStatus: null,
  jobs: null,
  jobsStreamSubscribed: false,
  engines: null,
  crawls: null,
  warcRows: null,
  warcDetail: null,
  warcSummary: null,
  warcOffset: 0,
  warcLimit: 100,
  warcQuery: '',
};

// ===================================================================
// Theme
// ===================================================================
function applyTheme() {
  const html = document.documentElement;
  if (state.theme === 'dark') {
    html.classList.add('dark');
    html.classList.remove('light');
    document.getElementById('icon-sun').classList.remove('hidden');
    document.getElementById('icon-moon').classList.add('hidden');
  } else {
    html.classList.remove('dark');
    html.classList.add('light');
    document.getElementById('icon-sun').classList.add('hidden');
    document.getElementById('icon-moon').classList.remove('hidden');
  }
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('fts-theme', state.theme);
  applyTheme();
}

// ===================================================================
// WebSocket Client
// ===================================================================
class WSClient {
  constructor() {
    this.ws = null;
    this.listeners = new Map();
    this.connected = false;
    this.reconnectTimer = null;
  }
  connect() {
    if (this.ws && (this.ws.readyState === WebSocket.OPEN || this.ws.readyState === WebSocket.CONNECTING)) return;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    try {
      this.ws = new WebSocket(`${proto}//${location.host}/ws`);
    } catch (e) {
      this.scheduleReconnect();
      return;
    }
    this.ws.onopen = () => {
      this.connected = true;
      // Re-subscribe existing listeners
      for (const [jobId] of this.listeners) {
        if (jobId !== '*') {
          this.ws.send(JSON.stringify({ type: 'subscribe', job_ids: [jobId] }));
        }
      }
    };
    this.ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const jobId = msg.job_id;
      if (jobId) {
        const cbs = this.listeners.get(jobId);
        if (cbs) cbs.forEach(cb => cb(msg));
        const wildcard = this.listeners.get('*');
        if (wildcard) wildcard.forEach(cb => cb(msg));
      }
    };
    this.ws.onclose = () => {
      this.connected = false;
      this.scheduleReconnect();
    };
    this.ws.onerror = () => {
      this.connected = false;
    };
  }
  scheduleReconnect() {
    if (this.reconnectTimer) return;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.connect();
    }, 2000);
  }
  subscribe(jobId, cb) {
    if (!this.listeners.has(jobId)) this.listeners.set(jobId, []);
    this.listeners.get(jobId).push(cb);
    if (this.ws && this.ws.readyState === WebSocket.OPEN && jobId !== '*') {
      this.ws.send(JSON.stringify({ type: 'subscribe', job_ids: [jobId] }));
    }
  }
  unsubscribe(jobId) {
    this.listeners.delete(jobId);
    if (this.ws && this.ws.readyState === WebSocket.OPEN && jobId !== '*') {
      this.ws.send(JSON.stringify({ type: 'unsubscribe', job_ids: [jobId] }));
    }
  }
  unsubscribeAll() {
    const ids = [...this.listeners.keys()].filter(k => k !== '*');
    this.listeners.clear();
    if (this.ws && this.ws.readyState === WebSocket.OPEN && ids.length > 0) {
      this.ws.send(JSON.stringify({ type: 'unsubscribe', job_ids: ids }));
    }
  }
}

const wsClient = new WSClient();

// ===================================================================
// Router
// ===================================================================
function navigateTo(path) { location.hash = path; }

function route() {
  const hash = (location.hash || '#/').slice(1);
  const qIdx = hash.indexOf('?');
  const path = qIdx >= 0 ? hash.slice(0, qIdx) : hash;
  const params = new URLSearchParams(qIdx >= 0 ? hash.slice(qIdx + 1) : '');
  if (jobsPollingTimer && path !== '/jobs') {
    clearInterval(jobsPollingTimer);
    jobsPollingTimer = null;
  }
  if (isDashboard) {
    refreshDashboardContext().catch(() => {});
  }

  updateActiveTab(path);

  if (path === '/' || path === '') {
    showHeaderSearch(false);
    if (isDashboard) { renderOverview(); } else { renderSearchHome(); }
  } else if (path === '/pipeline' && isDashboard) {
    showHeaderSearch(false);
    renderPipeline();
  } else if (path === '/jobs' && isDashboard) {
    showHeaderSearch(false);
    renderJobs();
  } else if (path === '/search') {
    const q = params.get('q') || '';
    const engine = params.get('engine') || '';
    if (q) {
      showHeaderSearch(true, q, engine);
      doSearchWithRender(q, parseInt(params.get('offset') || '0', 10), engine);
    } else {
      if (engine) state.searchEngine = engine;
      showHeaderSearch(false);
      renderSearchHome();
    }
  } else if (path === '/warc' && isDashboard) {
    showHeaderSearch(false);
    renderWARC();
  } else if (path.startsWith('/warc/') && isDashboard) {
    showHeaderSearch(false);
    const idx = path.split('/')[2] || '';
    renderWARCDetail(idx);
  } else if (path.startsWith('/browse')) {
    const shard = path.split('/')[2] || '';
    showHeaderSearch(false);
    renderBrowse(shard);
  } else if (path.startsWith('/doc/')) {
    const parts = path.split('/');
    const shard = parts[2];
    const docid = parts.slice(3).join('/');
    showHeaderSearch(true, state.query, state.searchEngine);
    renderDoc(shard, docid);
  } else if (path === '/crawls' && isDashboard) {
    showHeaderSearch(false);
    renderCrawls();
  } else {
    showHeaderSearch(false);
    if (isDashboard) { renderOverview(); } else { renderSearchHome(); }
  }
}

function updateActiveTab(path) {
  let activeTab = isDashboard ? 'overview' : 'search';
  if (path === '/pipeline') activeTab = 'pipeline';
  else if (path === '/jobs') activeTab = 'jobs';
  else if (path === '/search' || path === '/' && !isDashboard || path.startsWith('/doc/')) activeTab = 'search';
  else if (path === '/warc' || path.startsWith('/warc/')) activeTab = 'warc';
  else if (path.startsWith('/browse')) activeTab = 'browse';
  else if (path === '/crawls') activeTab = 'crawls';
  else if (path === '/' && isDashboard) activeTab = 'overview';

  document.querySelectorAll('#main-nav a[data-tab]').forEach(a => {
    if (a.dataset.tab === activeTab) {
      a.className = 'text-sm pb-1 tab-active transition-colors cursor-pointer';
    } else {
      a.className = 'text-sm pb-1 tab-inactive transition-colors cursor-pointer';
    }
  });
}

function showHeaderSearch(visible, value, engine) {
  const el = document.getElementById('header-search');
  const input = document.getElementById('header-search-input');
  if (visible) {
    el.classList.remove('hidden');
    el.classList.add('flex');
    if (value !== undefined) input.value = value;
    if (engine) state.searchEngine = engine;
    syncSearchEngineControls();
  } else {
    el.classList.add('hidden');
    el.classList.remove('flex');
  }
}

// ===================================================================
// API Helpers
// ===================================================================
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function apiPost(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const body = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function apiDelete(url) {
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiSearch(q, limit = 20, offset = 0, engine = '') {
  const engineQ = engine ? `&engine=${encodeURIComponent(engine)}` : '';
  return apiFetch(`/api/search?q=${encodeURIComponent(q)}&limit=${limit}&offset=${offset}${engineQ}`);
}

async function apiStats(engine = '') {
  const engineQ = engine ? `?engine=${encodeURIComponent(engine)}` : '';
  return apiFetch('/api/stats' + engineQ);
}

async function apiDoc(shard, docid) {
  return apiFetch(`/api/doc/${shard}/${encodeURIComponent(docid)}`);
}

async function apiBrowse(shard = '', {page = 1, pageSize = 100, q = '', sort = ''} = {}) {
  if (!shard) return apiFetch('/api/browse');
  let url = `/api/browse?shard=${encodeURIComponent(shard)}&page=${page}&page_size=${pageSize}`;
  if (q) url += `&q=${encodeURIComponent(q)}`;
  if (sort) url += `&sort=${encodeURIComponent(sort)}`;
  return apiFetch(url);
}

async function apiMetaScanDocs() {
  return apiPost('/api/meta/scan-docs', {});
}

async function apiOverview() {
  return apiFetch('/api/overview');
}

async function apiMetaStatus(crawl = '') {
  const url = crawl ? `/api/meta/status?crawl=${encodeURIComponent(crawl)}` : '/api/meta/status';
  return apiFetch(url);
}

async function apiMetaRefresh(crawl = '', force = true) {
  return apiPost('/api/meta/refresh', { crawl, force });
}

// ===================================================================
// Utilities
// ===================================================================
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(snippet, query) {
  if (!snippet || !query) return esc(snippet || '');
  const terms = query.split(/\s+/).filter(t => t.length > 1);
  let html = esc(snippet);
  for (const term of terms) {
    html = html.replace(new RegExp(`(${escRegex(term)})`, 'gi'), '<mark>$1</mark>');
  }
  return html;
}

function fmtBytes(bytes) {
  if (!bytes || bytes <= 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function docTitle(docid) {
  let name = docid.replace(/\.md$/i, '').replace(/[-_]+/g, ' ');
  try { name = decodeURIComponent(name); } catch(e) {}
  return name.length > 80 ? name.slice(0, 80) + '\u2026' : name;
}

function $(id) { return document.getElementById(id); }

function fmtDuration(startStr, endStr) {
  const start = new Date(startStr);
  const end = endStr ? new Date(endStr) : new Date();
  const ms = end - start;
  if (ms < 1000) return ms + 'ms';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const rs = s % 60;
  return m + 'm ' + rs + 's';
}

function statusClass(status) {
  switch (status) {
    case 'running': return 'status-running';
    case 'completed': return 'status-completed';
    case 'failed': return 'status-failed';
    case 'cancelled': return 'status-cancelled';
    case 'queued': return 'status-queued';
    default: return 'status-default';
  }
}

function statusChip(label, ok) {
  const cls = ok ? 'ui-chip-ok' : 'ui-chip-off';
  return `<span class="ui-chip ${cls}">${label}</span>`;
}

function renderBars(rows) {
  const max = rows.reduce((acc, r) => Math.max(acc, r.value || 0), 0) || 1;
  return `
    <div class="space-y-2">
      ${rows.map(r => `
        <div class="flex items-center gap-3">
          <span class="w-24 shrink-0 text-[11px] font-mono ui-subtle">${esc(r.label)}</span>
          <div class="flex-1 progress-track">
            <div class="progress-fill" style="width:${Math.max(2, ((r.value || 0) / max) * 100)}%"></div>
          </div>
          <span class="w-24 shrink-0 text-right text-[11px] font-mono ui-subtle">${esc(r.text)}</span>
        </div>`).join('')}
    </div>`;
}

function parseISOTime(s) {
  if (!s) return null;
  const t = new Date(s);
  if (isNaN(t.getTime())) return null;
  return t;
}

function fmtRelativeTime(iso) {
  const t = parseISOTime(iso);
  if (!t) return '\u2014';
  const sec = Math.floor((Date.now() - t.getTime()) / 1000);
  if (sec < 5) return 'just now';
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  return `${day}d ago`;
}

function metaContext() {
  const o = state.overview || {};
  const s = state.metaStatus || {};
  const generatedAt = o.meta_generated_at || s.finished_at || '';
  const stale = !!o.meta_stale;
  const refreshing = !!o.meta_refreshing || !!s.refreshing;
  const backend = o.meta_backend || s.backend || 'scan-fallback';
  const ttlMS = s.refresh_ttl_ms || 0;
  return { generatedAt, stale, refreshing, backend, ttlMS, lastError: o.meta_last_error || s.last_error || '' };
}

function renderMetaSummaryLine() {
  const m = metaContext();
  const bits = [];
  bits.push(`meta:${m.backend}`);
  bits.push(`updated:${fmtRelativeTime(m.generatedAt)}`);
  if (m.ttlMS > 0) bits.push(`ttl:${Math.round(m.ttlMS / 1000)}s`);
  bits.push(`stale:${m.stale ? 'yes' : 'no'}`);
  if (m.refreshing) bits.push('refreshing');
  if (m.lastError) bits.push(`error:${m.lastError}`);
  return bits.join(' · ');
}

function updateHeaderMetaChip() {
  if (!isDashboard) return;
  const chip = $('header-meta');
  const btn = $('header-meta-refresh');
  if (!chip || !btn) return;
  chip.classList.remove('hidden');
  btn.classList.remove('hidden');

}

async function refreshDashboardMeta(force = false) {
  if (!isDashboard) return;
  const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';
  try {
    await apiMetaRefresh(crawl, force);
  } catch (_) {
    // Ignore; status line shows last known error state from /api/meta/status.
  }
  await refreshDashboardContext();
}

async function refreshDashboardContext() {
  if (!isDashboard) return;
  const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';
  const [metaStatus, overview] = await Promise.all([
    apiMetaStatus(crawl).catch(() => null),
    apiOverview().catch(() => null),
  ]);
  if (metaStatus) state.metaStatus = metaStatus;
  if (overview) {
    state.overview = overview;
    state.overviewLoadedAt = Date.now();
  }
  if (state.overview && state.overview.meta_stale && !state.overview.meta_refreshing) {
    await apiMetaRefresh(crawl, false).catch(() => {});
  }
  updateHeaderMetaChip();
}

let metaWatchdogTimer = null;
function startMetaWatchdog() {
  if (!isDashboard) return;
  if (metaWatchdogTimer) clearInterval(metaWatchdogTimer);
  const tick = () => refreshDashboardContext().catch(() => {});
  tick();
  metaWatchdogTimer = setInterval(tick, 20000);
}

  // ── Section 2: Pipeline Progress ──

  const steps = [

    { label: 'Markdown', done: summary.markdown_ready || 0, total: pipeTotal, cls: 'ov-c2' },
    { label: 'Packed', done: summary.packed || 0, total: pipeTotal, cls: 'ov-c3' },

  // ── Section 3: Storage Breakdown ──

    { label: 'Markdown', value: d.md_total_size || 0, cls: 'ov-c2' },

  if (pipelinePollingTimer) { clearInterval(pipelinePollingTimer); pipelinePollingTimer = null; }

  try {
    const [overview, enginesData, jobs] = await Promise.all([
      apiOverview().catch(() => null),
      apiEngines().catch(() => ({ engines: [] })),
      reloadJobs(),
    ]);

    state.overview = overview;
    state.overviewLoadedAt = Date.now();
    state.engines = enginesData.engines || [];
    state.jobs = jobs || [];
    refreshDashboardContext().catch(() => {});

    const summary = $('pipeline-summary');
    if (summary && overview) {
      summary.textContent = `crawl:${overview.crawl_id || '-'} · warc:${(overview.warc_count || 0).toLocaleString()} · markdown:${(overview.md_doc_estimate || 0).toLocaleString()} docs · ${renderMetaSummaryLine()}`;
    }

    renderPipelineContent();
    ensureJobStreamSubscribed();
  } catch (e) {
    $('pipeline-content').innerHTML = `<div class="text-xs text-red-400">${esc(e.message)}</div>`;
  }
}

function countActive(jobs) {
  return jobs.filter(j => j.status === 'running' || j.status === 'queued').length;
}

function renderJobList(jobs) {
  const active = jobs.filter(j => j.status === 'running' || j.status === 'queued');
  if (active.length === 0) return '';
  return active.map(j => renderJobItem(j)).join('');
}

function renderJobItem(j) {
  const pct = Math.round((j.progress || 0) * 100);
  const rateStr = j.rate > 0 ? ` &middot; ${j.rate.toFixed(0)} docs/s` : '';
  const cancelBtn = (j.status === 'running' || j.status === 'queued')
    ? `<button onclick="cancelJob('${esc(j.id)}')" class="text-xs ui-link ml-2">cancel</button>`
    : '';
  return `
    <div class="mb-2 py-2 border-b" id="job-${esc(j.id)}">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-mono ui-subtle">${esc(j.id)} &middot; <span class="${statusClass(j.status)}">${esc(j.status)}</span>${rateStr}</span>
        <span class="text-xs font-mono ui-subtle">${pct}%${cancelBtn}</span>
      </div>
      <div class="progress-track mb-1">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="text-xs ui-subtle truncate">${esc(j.message || '')}</div>
    </div>`;
}

function renderJobHistory(jobs) {
  if (!jobs || jobs.length === 0) {

function submitJob(event, type) {
  event.preventDefault();
  const form = event.target;
  const files = form.elements.files ? form.elements.files.value : '0';

  const cfg = { type, files };

  if (type === 'markdown') {
    cfg.fast = form.elements.fast ? form.elements.fast.checked : false;
  } else if (type === 'pack') {
    cfg.format = form.elements.format ? form.elements.format.value : 'parquet';
  } else if (type === 'index') {
    cfg.engine = form.elements.engine ? form.elements.engine.value : DEFAULT_ENGINE;
    cfg.source = form.elements.source ? form.elements.source.value : 'files';
  }

  startJob(cfg);
  return false;
}

async function startJob(cfg) {
  try {
    const job = await apiCreateJob(cfg);
    // Add to state
    if (!state.jobs) state.jobs = [];
    state.jobs.unshift(job);

    // Subscribe to updates
    wsClient.subscribe(job.id, (msg) => onJobUpdate(msg));

    // Re-render job views if visible.
    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    } else if (state.currentPage === 'jobs') {
      const summary = $('jobs-summary');
      if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }
  } catch (e) {
    alert('Failed to start job: ' + e.message);
  }
}

async function cancelJob(id) {
  try {
    await apiCancelJob(id);
    // Update local state
    const job = state.jobs && state.jobs.find(j => j.id === id);
    if (job) {
      job.status = 'cancelled';
      job.ended_at = new Date().toISOString();
    }
    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    } else if (state.currentPage === 'jobs') {
      const summary = $('jobs-summary');
      if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }
  } catch (e) {
    alert('Failed to cancel job: ' + e.message);
  }
}

function onJobUpdate(msg) {
  if (!state.jobs) return;
  const job = state.jobs.find(j => j.id === msg.job_id);
  if (!job) return;

  if (msg.type === 'job_progress') {
    job.progress = msg.progress;
    job.message = msg.message;
    job.rate = msg.rate || 0;

    // Update in-place for active job rows on pipeline/jobs pages.
    if (state.currentPage === 'pipeline' || state.currentPage === 'jobs') {
      updateJobInPlace(job);
    }
  } else if (msg.type === 'job_update') {
    job.status = msg.status;
    if (msg.error) job.error = msg.error;
    if (msg.status === 'completed' || msg.status === 'failed' || msg.status === 'cancelled') {
      job.ended_at = new Date().toISOString();
      if (msg.status === 'completed') job.progress = 1.0;
    }

    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    } else if (state.currentPage === 'jobs') {
      const summary = $('jobs-summary');
      if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }
  }
}

function updateJobInPlace(job) {
  const el = $('job-' + job.id);
  if (!el) return;
  const pct = Math.round((job.progress || 0) * 100);
  const rateStr = job.rate > 0 ? ` &middot; ${job.rate.toFixed(0)} docs/s` : '';
  const cancelBtn = (job.status === 'running' || job.status === 'queued')
    ? `<button onclick="cancelJob('${esc(job.id)}')" class="text-xs ui-link ml-2">cancel</button>`
    : '';

  el.innerHTML = `
    <div class="flex items-center justify-between mb-1">
      <span class="text-xs font-mono ui-subtle">${esc(job.id)} &middot; <span class="${statusClass(job.status)}">${esc(job.status)}</span>${rateStr}</span>
      <span class="text-xs font-mono ui-subtle">${pct}%${cancelBtn}</span>
    </div>
    <div class="progress-track mb-1">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="text-xs ui-subtle truncate">${esc(job.message || '')}</div>`;
}

// Tab 3: Jobs
// ===================================================================
function jobCounts(jobs) {
  const counts = { total: 0, queued: 0, running: 0, completed: 0, failed: 0, cancelled: 0 };
  for (const j of (jobs || [])) {
    counts.total += 1;
    if (counts[j.status] !== undefined) counts[j.status] += 1;
  }
  return counts;
}

function renderJobsSummaryLine(jobs) {
  const c = jobCounts(jobs);
  return `jobs:${c.total} · running:${c.running} · queued:${c.queued} · completed:${c.completed} · failed:${c.failed} · cancelled:${c.cancelled}`;
}

function renderJobsContent() {
  const el = $('jobs-content');
  if (!el) return;
  const jobs = state.jobs || [];
  const active = jobs.filter(j => j.status === 'running' || j.status === 'queued');
  const c = jobCounts(jobs);

  const cards = [
    { label: 'Total', value: c.total },
    { label: 'Running', value: c.running },
    { label: 'Queued', value: c.queued },
    { label: 'Failed', value: c.failed },
  ];

  el.innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
      ${cards.map(card => `
        <div class="surface p-4">
          <div class="text-xs font-mono ui-subtle mb-1">${esc(String(card.label))}</div>
          <div class="text-lg font-medium">${esc(String(card.value))}</div>
        </div>`).join('')}
    </div>
    <div class="surface p-4 mb-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-medium">Active Jobs</h2>
        <span class="meta-line">${active.length} active</span>
      </div>
      ${active.length > 0 ? active.map(j => renderJobItem(j)).join('') : '<div class="ui-empty">No running or queued jobs.</div>'}
    </div>
    <div>
      <h2 class="text-sm font-medium mb-3">All Jobs</h2>
      ${renderJobHistory(jobs)}
    </div>`;
}

async function renderJobs() {
  state.currentPage = 'jobs';
  const main = $('main');
  main.innerHTML = `
    <div class="page-shell anim-fade-in">
      <div class="page-header">
        <h1 class="page-title">Jobs</h1>
        <button onclick="renderJobs()" class="ui-btn px-3 py-2 text-xs font-mono">Reload</button>
      </div>
      <div id="jobs-summary" class="meta-line mb-4">loading...</div>
      <div id="jobs-content"><div class="ui-empty">loading...</div></div>
    </div>`;

  try {
    await Promise.all([
      ensureEnginesLoaded(),
      refreshDashboardContext().catch(() => {}),
      reloadJobs(),
    ]);
    ensureJobStreamSubscribed();
    const summary = $('jobs-summary');
    if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
    renderJobsContent();

    if (jobsPollingTimer) clearInterval(jobsPollingTimer);
    jobsPollingTimer = setInterval(async () => {
      if (state.currentPage !== 'jobs') return;
      // Only poll when WebSocket is disconnected — WS handles real-time updates
      if (wsClient.connected) return;
      await reloadJobs();
      const line = $('jobs-summary');
      if (line) line.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }, 5000);
  } catch (e) {
    $('jobs-content').innerHTML = `<div class="text-xs text-red-400">${esc(e.message)}</div>`;
  }
}

async function loadHomeStats() {
  const el = $('home-stats');
  if (!el) return;
  try {
    const d = await apiStats(currentSearchEngine());
    state.stats = d;
    if (d.engine) state.searchEngine = d.engine;
    syncSearchEngineControls();
    el.innerHTML = `<span class="meta-line">${esc(d.engine)} &middot; ${(d.total_docs||0).toLocaleString()} docs &middot; ${d.shards||0} shards &middot; ${d.total_disk||'\u2014'}</span>`;

    el.innerHTML = `<span class="meta-line">No index yet. Run <code>search cc fts index</code> to get started.</span>`;

function doSearch(query) {
  if (!query.trim()) return;
  state.query = query.trim();
  navigateTo(buildSearchURL(state.query, 0));
}

async function doSearchWithRender(query, offset = 0, engine = '') {
  if (!query.trim()) { renderSearchHome(); return; }
  if (engine) state.searchEngine = engine;
  await ensureEnginesLoaded();
  state.query = query.trim();
  state.loading = true;
  state.currentPage = 'search';
  syncSearchEngineControls();
  renderSearchLoading();

  try {
    const data = await apiSearch(query, 20, offset, currentSearchEngine());
    if (data.engine) state.searchEngine = data.engine;
    syncSearchEngineControls();
    state.results = data;
    state.loading = false;
    renderSearchResults(data, query, offset);
  } catch (err) {
    state.loading = false;
    renderError('Search failed: ' + err.message);
  }
}

function renderSearchLoading() {
  const lines = Array(6).fill('').map((_, i) => `
    <div class="py-6 anim-fade-up" style="animation-delay:${i*40}ms">
      <div class="h-4 w-2/5 ui-skeleton mb-2"></div>
      <div class="h-3 w-1/3 ui-skeleton mb-3"></div>
      <div class="h-3 w-full ui-skeleton mb-1"></div>
      <div class="h-3 w-4/5 ui-skeleton"></div>
    </div>`).join('<div class="border-t"></div>');
  $('main').innerHTML = `<div class="py-8 max-w-3xl mx-auto">${lines}</div>`;
}

function renderSearchResults(data, query, offset) {
  if (!data || !data.hits || data.hits.length === 0) {
    $('main').innerHTML = `
      <div class="py-20 text-center anim-fade-in max-w-3xl mx-auto">
        <p class="ui-subtle text-sm mb-1">Nothing matched <strong>&laquo;${esc(query)}&raquo;</strong></p>
        <p class="ui-subtle text-xs">Try different terms or broaden your query</p>
      </div>`;
    return;
  }

  const pageSize = 20;
  const page = Math.floor(offset / pageSize) + 1;
  const totalPages = Math.ceil((data.total || data.hits.length) / pageSize);

  const results = data.hits.map((hit, i) => `
    <a href="#/doc/${hit.shard || '00000'}/${encodeURIComponent(hit.doc_id)}"
       class="block result-item py-6 -mx-2 px-2 cursor-pointer anim-fade-up"
       style="animation-delay:${i * 30}ms">
      <div class="flex items-baseline justify-between gap-4 mb-1">
        <span class="text-base font-medium truncate">${esc(docTitle(hit.doc_id))}</span>
        <span class="text-xs font-mono ui-subtle shrink-0">${hit.score ? hit.score.toFixed(2) : ''}</span>
      </div>
      <div class="text-xs font-mono ui-subtle mb-2">${esc(hit.shard || '')} &middot; ${esc(hit.doc_id)}</div>
      ${hit.snippet ? `<p class="text-sm ui-subtle leading-relaxed line-clamp-3">${highlight(hit.snippet, query)}</p>` : ''}
    </a>`).join('<div class="border-t"></div>');

  $('main').innerHTML = `
    <div class="py-8 max-w-3xl mx-auto anim-fade-in">
      <div class="meta-line mb-6">
        ${(data.total || data.hits.length).toLocaleString()} results${data.elapsed_ms ? ` &middot; ${data.elapsed_ms}ms` : ''}${data.shards ? ` &middot; ${data.shards} shard${data.shards!==1?'s':''}` : ''}${data.engine ? ` &middot; ${esc(data.engine)}` : ''}
      </div>
      <div>${results}</div>
      ${totalPages > 1 ? renderSearchPagination(page, totalPages, query, pageSize, data.engine || currentSearchEngine()) : ''}
    </div>`;
}

function renderSearchPagination(cur, total, query, pageSize, engine) {
  let pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages.push(1);
    if (cur > 3) pages.push('\u2026');
    for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) pages.push(i);
    if (cur < total - 2) pages.push('\u2026');
    pages.push(total);
  }

  const btn = (p, active) => {
    if (p === '\u2026') return `<span class="px-2 py-1 text-xs ui-subtle">\u2026</span>`;
    const cls = active
      ? 'px-2 py-1 text-xs font-mono font-medium'
      : 'px-2 py-1 text-xs font-mono ui-link transition-colors';
    const params = new URLSearchParams({ q: query, offset: String((p-1)*pageSize), engine: engine || currentSearchEngine() });
    return `<a href="#/search?${params.toString()}" class="${cls}">${p}</a>`;
  };

  const prevParams = new URLSearchParams({ q: query, offset: String((cur-2)*pageSize), engine: engine || currentSearchEngine() });
  const nextParams = new URLSearchParams({ q: query, offset: String(cur*pageSize), engine: engine || currentSearchEngine() });
  return `
    <div class="flex items-center justify-center gap-1 pt-8 pb-4">
      ${cur > 1 ? `<a href="#/search?${prevParams.toString()}" class="text-xs font-mono ui-link transition-colors mr-2">&larr; prev</a>` : ''}
      ${pages.map(p => btn(p, p === cur)).join('')}
      ${cur < total ? `<a href="#/search?${nextParams.toString()}" class="text-xs font-mono ui-link transition-colors ml-2">next &rarr;</a>` : ''}
    </div>`;
}

async function renderWARC(offset = state.warcOffset || 0, query = state.warcQuery || '') {

        <h1 class="page-title">WARC Console</h1>
        <div class="flex items-center gap-2">
          <button onclick="refreshDashboardMeta(true)" class="ui-btn px-3 py-2 text-xs font-mono">Refresh Metadata</button>
          <button onclick="renderWARC(0, state.warcQuery||'')" class="ui-btn px-3 py-2 text-xs font-mono">Reload</button>
        </div>
      </div>
      <div id="warc-meta" class="meta-line mb-5">loading metadata...</div>
      <div class="surface p-3 mb-4">

  try {

    state.warcRows = data.warcs || [];
    state.warcSummary = data.summary || null;
    state.warcOffset = data.offset || 0;
    state.warcLimit = data.limit || state.warcLimit || 100;

    const meta = $('warc-meta');
    if (meta) {
      const parts = [];
      if (data.meta_backend) parts.push(`meta:${data.meta_backend}`);
      if (data.meta_generated_at) parts.push(`updated:${fmtRelativeTime(data.meta_generated_at)}`);
      if (data.meta_stale) parts.push('stale');
      if (data.meta_refreshing) parts.push('refreshing\u2026');
      if (data.meta_last_error) parts.push(`error:${data.meta_last_error}`);
      meta.textContent = parts.join(' · ');

  } catch (e) {

function renderWARCContent(data) {
  const el = $('warc-content');
  if (!el) return;
  const summary = data.summary || {};
  const total = summary.total || 0;
  const dl = summary.downloaded || 0;
  const md = summary.markdown_ready || 0;
  const pk = summary.packed || 0;
  const ix = summary.indexed || 0;

  // ── Pipeline Funnel — stacked bar + step counts ──
  const funnelSteps = [
    { label: 'Downloaded', count: dl, cls: 'ov-c1' },
    { label: 'Markdown', count: md, cls: 'ov-c2' },
    { label: 'Packed', count: pk, cls: 'ov-c3' },
    { label: 'Indexed', count: ix, cls: 'ov-c4' },
  ];
  const hasSizes = summary.warc_bytes || summary.markdown_bytes || summary.pack_bytes || summary.fts_bytes;
  const totalBytes = (summary.warc_bytes || 0) + (summary.markdown_bytes || 0) + (summary.pack_bytes || 0) + (summary.fts_bytes || 0);
  const funnelHTML = total > 0 ? `
    <div class="surface p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <div class="text-[11px] font-mono ui-subtle">${total.toLocaleString()} WARC files${hasSizes ? ` \u00b7 ${fmtBytes(totalBytes)} total` : ''}</div>
        <div class="text-[11px] font-mono ui-subtle">${ix === total ? 'all indexed' : `${(total - ix).toLocaleString()} remaining`}</div>
      </div>
      <div class="ov-stacked mb-3">
        ${funnelSteps.map(s => {
          const w = total > 0 ? Math.max(s.count > 0 ? 1 : 0, (s.count / total) * 100) : 0;
          return `<div class="ov-stacked-seg ${s.cls}" style="width:${w}%" title="${s.label}: ${s.count}/${total}"></div>`;
        }).join('')}
      </div>
      <div class="grid grid-cols-4 gap-3">
        ${funnelSteps.map(s => {
          const pct = total > 0 ? Math.round((s.count / total) * 100) : 0;
          return `
            <div class="flex items-center gap-2">
              <div class="ov-legend-dot ${s.cls}"></div>
              <div>
                <div class="text-[11px] font-mono">${s.count.toLocaleString()} <span class="ui-subtle">${esc(s.label.toLowerCase())}</span></div>
                <div class="text-[10px] font-mono ui-subtle">${pct}%</div>
              </div>
            </div>`;
        }).join('')}
      </div>
      ${hasSizes ? `
        <div class="flex items-center gap-4 mt-3 pt-3 border-t text-[11px] font-mono ui-subtle">
          ${summary.warc_bytes ? `<span>warc ${fmtBytes(summary.warc_bytes)}</span>` : ''}
          ${summary.markdown_bytes ? `<span>md ${fmtBytes(summary.markdown_bytes)}</span>` : ''}
          ${summary.pack_bytes ? `<span>pk ${fmtBytes(summary.pack_bytes)}</span>` : ''}
          ${summary.fts_bytes ? `<span>ix ${fmtBytes(summary.fts_bytes)}</span>` : ''}
        </div>` : ''}
    </div>` : '';

  // ── Table rows with smart next-step highlighting + mini progress ──
  const rows = (data.warcs || []).map((w, i) => {
    const next = !w.has_warc ? 'dl' : !w.has_markdown ? 'md' : !w.has_pack ? 'pk' : !w.has_fts ? 'ix' : '';
    const done = (w.has_warc ? 1 : 0) + (w.has_markdown ? 1 : 0) + (w.has_pack ? 1 : 0) + (w.has_fts ? 1 : 0);
    const docsStr = w.markdown_docs > 0 ? w.markdown_docs.toLocaleString() : '\u2014';
    return `
    <tr class="anim-fade-up" style="animation-delay:${Math.min(i, 20)*15}ms">
      <td class="px-3 py-2 font-mono text-xs"><a href="#/warc/${encodeURIComponent(w.index)}" class="hover:underline">${esc(w.index)}</a></td>
      <td class="px-3 py-2 text-xs ui-subtle truncate max-w-[260px]" title="${esc(w.filename || '')}">${esc(w.filename || '\u2014')}</td>
      <td class="px-3 py-2 text-xs">
        <div class="flex items-center gap-2">
          <div class="flex gap-1">
            ${statusChip('dl', !!w.has_warc)}
            ${statusChip('md', !!w.has_markdown)}
            ${statusChip('pk', !!w.has_pack)}
            ${statusChip('ix', !!w.has_fts)}
          </div>
          <div class="progress-track" style="width:40px;height:4px">
            <div class="${done === 4 ? 'ov-c4' : 'progress-fill'}" style="height:100%;width:${done * 25}%"></div>
          </div>
        </div>
      </td>
      <td class="px-3 py-2 text-right text-xs font-mono ui-subtle">${docsStr}</td>
      <td class="px-3 py-2 text-right text-xs font-mono ui-subtle">${fmtBytes(w.total_bytes || 0)}</td>
      <td class="px-3 py-2 text-right text-xs font-mono whitespace-nowrap">
        <button onclick="warcAction('${esc(w.index)}','download')" class="ui-btn px-2 py-1 text-[11px] ${next==='dl'?'ui-btn-primary':''}" title="Download WARC">dl</button>
        <button onclick="warcAction('${esc(w.index)}','markdown')" class="ui-btn px-2 py-1 text-[11px] ml-1 ${next==='md'?'ui-btn-primary':''}" title="Extract markdown">md</button>
        <button onclick="warcAction('${esc(w.index)}','pack',{format:'parquet'})" class="ui-btn px-2 py-1 text-[11px] ml-1 ${next==='pk'?'ui-btn-primary':''}" title="Pack (parquet)">pk</button>
        <button onclick="warcAction('${esc(w.index)}','index',{engine:currentSearchEngine(),source:'files'})" class="ui-btn px-2 py-1 text-[11px] ml-1 ${next==='ix'?'ui-btn-primary':''}" title="Build FTS index">ix</button>
      </td>
    </tr>`;
  }).join('');

  const nextOffset = (data.offset || 0) + (data.limit || 0);
  const prevOffset = Math.max(0, (data.offset || 0) - (data.limit || 0));
  const canPrev = (data.offset || 0) > 0;
  const canNext = nextOffset < (data.total || 0);
  const showFrom = total > 0 ? (data.offset || 0) + 1 : 0;
  const showTo = Math.min((data.offset || 0) + (data.limit || 0), data.total || 0);

  // Incomplete count for batch actions
  const incomplete = (data.warcs || []).filter(w => !w.has_warc || !w.has_markdown || !w.has_pack || !w.has_fts);

  el.innerHTML = `

        <span class="text-[11px] font-mono ui-subtle">${incomplete.length} incomplete on this page</span>

      </div>` : ''}

      <table class="w-full text-sm ui-table">
        <thead>
          <tr>
            <th class="text-left px-3 py-2 text-[11px] font-mono">WARC</th>
            <th class="text-left px-3 py-2 text-[11px] font-mono">Filename</th>
            <th class="text-left px-3 py-2 text-[11px] font-mono">Phases</th>
            <th class="text-right px-3 py-2 text-[11px] font-mono">Docs</th>
            <th class="text-right px-3 py-2 text-[11px] font-mono">Size</th>

        <tbody>
          ${rows || `<tr><td colspan="6" class="px-3 py-4 text-xs font-mono ui-subtle">No WARC records</td></tr>`}

      </table>
    </div>
    <div class="flex items-center justify-between mt-3">
      <div class="text-xs font-mono ui-subtle">${showFrom > 0 ? `showing ${showFrom}\u2013${showTo} of ${(data.total||0).toLocaleString()}` : 'no results'}</div>
      <div class="flex items-center gap-2">
        <button ${canPrev ? '' : 'disabled'} onclick="renderWARC(${prevOffset}, state.warcQuery || '')" class="ui-btn px-3 py-1 text-xs font-mono ${canPrev ? '' : 'opacity-40 cursor-not-allowed'}">prev</button>
        <span class="text-[11px] font-mono ui-subtle">${total > 0 ? `page ${Math.floor((data.offset||0)/(data.limit||100))+1}` : ''}</span>
        <button ${canNext ? '' : 'disabled'} onclick="renderWARC(${nextOffset}, state.warcQuery || '')" class="ui-btn px-3 py-1 text-xs font-mono ${canNext ? '' : 'opacity-40 cursor-not-allowed'}">next</button>
      </div>
    </div>`;
}

// Batch: run next missing step on all visible incomplete WARCs
async function warcBatchNext() {
  const warcs = state.warcRows || [];
  let started = 0;
  for (const w of warcs) {
    if (!w.has_warc) {
      warcAction(w.index, 'download'); started++;
    } else if (!w.has_markdown) {
      warcAction(w.index, 'markdown'); started++;
    } else if (!w.has_pack) {
      warcAction(w.index, 'pack', { format: 'parquet' }); started++;
    } else if (!w.has_fts) {
      warcAction(w.index, 'index', { engine: currentSearchEngine(), source: 'files' }); started++;
    }
  }
  const msg = $('warc-meta');
  if (msg) msg.textContent = `started ${started} job${started !== 1 ? 's' : ''} (next step for each incomplete WARC)`;
}

let warcActionMessage = '';

async function warcAction(index, action, extra = {}, refreshDetail = false) {
  const msg = $('warc-action-msg');
  if (msg) msg.textContent = `running ${action} on ${index}...`;
  warcActionMessage = '';
  try {
    const res = await apiWARCAction(index, { action, ...extra });
    if (res && res.job && res.job.id) {
      if (!state.jobs) state.jobs = [];
      state.jobs.unshift(res.job);
      wsClient.subscribe(res.job.id, (m) => onJobUpdate(m));
      warcActionMessage = `job ${res.job.id} started: ${action}`;
    } else {
      warcActionMessage = `action ${action} completed`;
    }
    if (msg) msg.textContent = warcActionMessage;
    if (refreshDetail) {
      // Delay re-render so user sees the feedback message
      setTimeout(() => renderWARCDetail(index), 400);
    } else if (state.currentPage === 'warc') {
      setTimeout(() => renderWARC(state.warcOffset || 0, state.warcQuery || ''), 400);
    }
  } catch (e) {
    warcActionMessage = `action failed: ${e.message}`;
    if (msg) msg.textContent = warcActionMessage;
  }
}

async function loadShardDocs(shard, page = 1) {
  const el = $('browse-content');
  if (!el) return;
  el.innerHTML = `<div class="ui-empty">loading\u2026</div>`;

  const q = state.browseQ || '';
  const sort = state.browseSort || 'date';

  try {
    const data = await apiBrowse(shard, {page, pageSize: 100, q, sort});

    if (data.has_doc_meta && data.docs) {
      renderDocTable(shard, data, page);
    } else {
      renderFileFallback(shard, data);
    }
  } catch(e) {
    el.innerHTML = `<div class="text-xs text-red-400 py-4">${esc(e.message)}</div>`;
  }
}

// ── Browse helpers ────────────────────────────────────────────────────────────

function fmtDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  if (isNaN(d)) return isoStr;
  return d.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
}

function truncateURL(url, maxLen) {
  if (!url || url.length <= maxLen) return esc(url);
  const half = Math.floor((maxLen - 3) / 2);
  return esc(url.slice(0, half) + '…' + url.slice(-half));
}

function renderCrawlsContent(crawls) {
  const el = $('crawls-content');
  if (!el) return;

  if (!crawls || crawls.length === 0) {
    el.innerHTML = '<div class="ui-empty">No crawls found.</div>';
    return;
  }
  const activeCrawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';

  el.innerHTML = `
    <div class="surface overflow-x-auto">
      <table class="w-full text-sm ui-table">
        <thead>
          <tr>
            <th class="text-left px-4 py-2 text-xs font-mono">Crawl ID</th>
            <th class="text-left px-4 py-2 text-xs font-mono">Name</th>
            <th class="text-left px-4 py-2 text-xs font-mono">From</th>
            <th class="text-left px-4 py-2 text-xs font-mono">To</th>
            <th class="text-right px-4 py-2 text-xs font-mono">Status</th>
          </tr>
        </thead>
        <tbody>
          ${crawls.map((c, i) => `
            <tr class="anim-fade-up" style="animation-delay:${i * 20}ms">
              <td class="px-4 py-2 font-mono text-xs">${esc(c.id || '')}</td>
              <td class="px-4 py-2 text-xs">${esc(c.name || '')}</td>
              <td class="px-4 py-2 font-mono text-xs ui-subtle">${formatCrawlDate(c.from)}</td>
              <td class="px-4 py-2 font-mono text-xs ui-subtle">${formatCrawlDate(c.to)}</td>
              <td class="px-4 py-2 text-right text-xs font-mono ${c.id === activeCrawl ? 'status-completed' : 'ui-subtle'}">${c.id === activeCrawl ? 'active' : ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="meta-line mt-3">${crawls.length} crawls total</div>`;
}

function formatCrawlDate(d) {
  if (!d) return '\u2014';
  // d could be ISO string or time.Time JSON
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return esc(String(d));
    return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch {
    return esc(String(d));
  }
}

  const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);

  // Cmd+K — focus search input
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const h = $('header-search-input');
    const home = $('home-search-input');
    if (home && !home.closest('.hidden')) { home.focus(); home.select(); }
    else if (h && !h.closest('.hidden')) { h.focus(); h.select(); }
    else {
      // Navigate to search tab if not there
      navigateTo('/search');
    }
  }

  // / — focus search (when not in input)
  if (e.key === '/' && !isInput) {
    e.preventDefault();
    const h = $('header-search-input');
    const home = $('home-search-input');
    if (home && !home.closest('.hidden')) home.focus();
    else if (h && !h.closest('.hidden')) h.focus();
    else navigateTo('/search');
  }

  // Escape — blur active input
  if (e.key === 'Escape') document.activeElement.blur();

  // Number keys — switch tabs (when not in input)
  if (!isInput && e.key >= '1' && e.key <= '7' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const tabs = isDashboard
      ? ['/', '/pipeline', '/jobs', '/search', '/warc', '/browse', '/crawls']
      : ['/search', '/browse'];
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < tabs.length) {
      e.preventDefault();
      navigateTo(tabs[idx]);
    }
  }
});

// ===================================================================
// Init
// ===================================================================
applyTheme();

// In search-only mode: hide dashboard tabs, adjust header title, narrow layout.
if (!isDashboard) {
  document.querySelectorAll('#main-nav a[data-tab]').forEach(a => {
    if (['overview', 'pipeline', 'jobs', 'warc', 'crawls'].includes(a.dataset.tab)) a.style.display = 'none';
  });
  const metaChip = $('header-meta');
  const metaBtn = $('header-meta-refresh');
  if (metaChip) metaChip.style.display = 'none';
  if (metaBtn) metaBtn.style.display = 'none';
  const logo = document.querySelector('header a[href="#/"]');
  if (logo) logo.textContent = 'FTS';
  const main = document.getElementById('main');
  if (main) { main.classList.remove('max-w-5xl', 'max-w-6xl'); main.classList.add('max-w-3xl'); }
} else {
  startMetaWatchdog();
}

// WebSocket only in dashboard mode.
if (isDashboard) { wsClient.connect(); }

window.addEventListener('hashchange', route);
route();
</script>
</body>
