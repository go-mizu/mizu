<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Geist', 'system-ui', 'sans-serif'],
            mono: ['"Geist Mono"', 'monospace'],
          },
          borderRadius: {
            DEFAULT: '0',
            sm: '0',
            md: '0',
            lg: '0',
            xl: '0',
            full: '0',
          },
        },
      },
    };
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #ffffff;
      --panel: #ffffff;
      --panel-soft: #ffffff;
      --border: #d4d4d8;
      --text: #09090b;
      --text-soft: #52525b;
      --accent: #09090b;
      --accent-soft: #3f3f46;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: none;
    }
    html.dark {
      --bg: #0a0a0a;
      --bg-soft: #0a0a0a;
      --panel: #0a0a0a;
      --panel-soft: #0a0a0a;
      --border: #27272a;
      --text: #e5e7eb;
      --text-soft: #9ca3af;
      --accent: #f3f4f6;
      --accent-soft: #d1d5db;
      --success: #22c55e;
      --danger: #f87171;
      --shadow: none;
    }
    * {
      border-radius: 0 !important;
      border-color: var(--border);
    }
    body {
      color: var(--text);
      background: var(--bg);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .anim-fade-up {
      animation: fadeUp 0.25s ease-out forwards;
      opacity: 0;
    }
    .anim-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
      opacity: 0;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(113,113,122,0.26); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(113,113,122,0.4); }
    mark { background: rgba(250, 204, 21, 0.15); color: inherit; padding: 0 2px; }
    .light mark { background: rgba(250, 204, 21, 0.25); }
    .prose pre {
      border-radius: 0 !important;
      border: 1px solid var(--border);
      background: transparent;
    }
    .prose code { color: var(--text); }
    .prose blockquote { border-left-color: var(--border); color: var(--text-soft); }
    .prose table th, .prose table td, .prose hr { border-color: var(--border); }
    .prose img { border-radius: 0 !important; }
    .result-item { transition: background 0.15s ease, border-color 0.15s ease; border: 1px solid transparent; }
    .result-item:hover { background: transparent; border-color: var(--accent); }
    .tab-active { color: var(--accent); border-bottom: 1px solid var(--accent); }
    .tab-inactive { color: var(--text-soft); border-bottom: 1px solid transparent; }
    .tab-inactive:hover { color: var(--text); }
    .shard-active { color: var(--accent); font-weight: 500; }
    .shard-item { color: var(--text-soft); transition: color 0.1s; }
    .shard-item:hover { color: var(--text); }
    .file-row { transition: background 0.1s; border: 1px solid transparent; }
    .file-row:hover { background: transparent; border-color: var(--accent); }
    .progress-track {
      width: 100%;
      height: 6px;
      background: transparent;
      border: 1px solid var(--border);
    }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    .dark .progress-fill { background: var(--accent); }
    .step-card {
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1rem;
      background: var(--panel);
      box-shadow: none;
    }
    .surface {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: none;
    }
    .surface-soft {
      border: 1px solid var(--border);
      background: var(--panel-soft);
      box-shadow: none;
    }
    .ui-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all 0.12s ease;
    }
    .ui-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
    .ui-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .ui-btn-primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .ui-btn-primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); color: #fff; }
    .ui-btn-danger { border-color: rgba(220, 38, 38, 0.4); color: var(--danger); }
    .ui-btn-danger:hover { background: transparent; border-color: var(--danger); }
    .ui-input, .ui-select {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }
    .ui-input:focus, .ui-select:focus {
      outline: none;
      border-color: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent-soft);
    }
    .ui-input::placeholder { color: var(--text-soft); }
    .ui-subtle { color: var(--text-soft); }
    .ui-table th { color: var(--text-soft); font-weight: 400; }
    .ui-table thead { background: transparent; }
    .ui-table td, .ui-table th { border-bottom: 1px solid var(--border); }
    .ui-table tbody tr:last-child td { border-bottom: 0; }
    .ui-table tbody tr:hover { background: transparent; }
    .page-shell { padding-top: 2rem; padding-bottom: 2rem; }
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .page-title { font-size: 1.6rem; line-height: 1.9rem; font-weight: 600; letter-spacing: -0.02em; }
    .meta-line { font-size: 11px; line-height: 1.25rem; font-family: "Geist Mono", monospace; color: var(--text-soft); }
    .ui-link { color: var(--text-soft); transition: color 0.12s ease; }
    .ui-link:hover { color: var(--text); }
    .ui-chip {
      display: inline-flex;
      align-items: center;
      padding: 0.125rem 0.5rem;
      font-size: 10px;
      line-height: 1;
      font-family: "Geist Mono", monospace;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
    }
    .ui-chip-ok { border-color: rgba(22, 163, 74, 0.5); color: #15803d; background: transparent; }
    .dark .ui-chip-ok { border-color: rgba(34, 197, 94, 0.6); color: #86efac; background: transparent; }
    .ui-chip-off { color: var(--text-soft); }
    .ui-empty {
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-soft);
      padding: 1rem;
      font-size: 12px;
      font-family: "Geist Mono", monospace;
    }
    .ui-border-r { border-right: 1px solid var(--border); }
    .ui-kbd {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-soft);
      padding: 0 0.35rem;
      font-size: 10px;
      font-family: "Geist Mono", monospace;
    }
    .ui-skeleton { border: 1px solid var(--border); background: var(--border); }
    .app-header { border-bottom: 1px solid var(--border); background: var(--bg-soft); }
    .theme-toggle { color: var(--text-soft); transition: color 0.12s ease; }
    .theme-toggle:hover { color: var(--text); }
    .status-running { color: #2563eb; }
    .status-completed { color: #16a34a; }
    .status-failed { color: #dc2626; }
    .status-cancelled, .status-queued, .status-default { color: var(--text-soft); }
    .dark .status-running { color: #93c5fd; }
    .dark .status-completed { color: #86efac; }
    .dark .status-failed { color: #fca5a5; }
    #main-nav {
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
    }
    #main-nav::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="antialiased min-h-screen font-sans">
  <div id="app">
    <header class="sticky top-0 z-50 app-header">
      <div class="max-w-6xl mx-auto flex items-center min-h-[3.5rem] px-4 md:px-6 gap-4 md:gap-6 flex-wrap md:flex-nowrap py-2">
        <a href="#/" class="text-sm font-medium tracking-tight shrink-0 hover:opacity-70 transition-opacity">FTS Dashboard</a>
        <div id="header-search" class="flex-1 hidden items-center gap-2">
          <input id="header-search-input" type="text"
            placeholder="What are you looking for?"
            class="ui-input flex-1 h-8 px-2 text-sm"
            onkeydown="if(event.key==='Enter')doSearch(this.value)">
          <select id="header-search-engine"
            class="ui-select h-8 text-xs px-2"
            onchange="applySearchEngine(this.value)">
          </select>
        </div>
        <nav id="main-nav" class="flex items-center gap-4 ml-auto shrink min-w-0">
          <a href="#/" data-tab="overview" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Overview</a>
          <a href="#/pipeline" data-tab="pipeline" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Pipeline</a>
          <a href="#/jobs" data-tab="jobs" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Jobs</a>
          <a href="#/search" data-tab="search" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Search</a>
          <a href="#/warc" data-tab="warc" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">WARC</a>
          <a href="#/browse" data-tab="browse" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Browse</a>
          <a href="#/crawls" data-tab="crawls" class="text-sm pb-1 tab-inactive transition-colors cursor-pointer">Crawls</a>
          <button id="header-meta-refresh" onclick="refreshDashboardMeta(false)" class="hidden ui-btn px-2 py-1 text-[11px] font-mono ui-subtle">Refresh Meta</button>
          <span id="header-meta" class="hidden text-[11px] font-mono ui-subtle whitespace-nowrap"></span>
          <button onclick="toggleTheme()" class="theme-toggle" title="Toggle theme">
            <svg id="icon-sun" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg id="icon-moon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
        </nav>
      </div>
    </header>
    <main id="main" class="max-w-6xl mx-auto px-4 md:px-6"></main>
  </div>

<script>
// ===================================================================
// Mode: injected by server — "dashboard" or "search"
// ===================================================================
const MODE = "__SERVER_MODE__";
const isDashboard = MODE === 'dashboard';

// ===================================================================
// State
// ===================================================================
const state = {
  query: '',
  searchEngine: '',
  results: null,
  stats: null,
  loading: false,
  currentPage: '',
  browseShards: null,
  browseFiles: null,
  browseShard: '',
  doc: null,
  theme: localStorage.getItem('fts-theme') || 'dark',
  overview: null,
  overviewLoadedAt: 0,
  metaStatus: null,
  jobs: null,
  jobsStreamSubscribed: false,
  engines: null,
  crawls: null,
  warcRows: null,
  warcDetail: null,
  warcSummary: null,
  warcOffset: 0,
  warcLimit: 100,
  warcQuery: '',
};

// ===================================================================
// Theme
// ===================================================================
function applyTheme() {
  const html = document.documentElement;
  if (state.theme === 'dark') {
    html.classList.add('dark');
    html.classList.remove('light');
    document.getElementById('icon-sun').classList.remove('hidden');
    document.getElementById('icon-moon').classList.add('hidden');
  } else {
    html.classList.remove('dark');
    html.classList.add('light');
    document.getElementById('icon-sun').classList.add('hidden');
    document.getElementById('icon-moon').classList.remove('hidden');
  }
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('fts-theme', state.theme);
  applyTheme();
}

// ===================================================================
// WebSocket Client
// ===================================================================
class WSClient {
  constructor() {
    this.ws = null;
    this.listeners = new Map();
    this.connected = false;
    this.reconnectTimer = null;
  }
  connect() {
    if (this.ws && (this.ws.readyState === WebSocket.OPEN || this.ws.readyState === WebSocket.CONNECTING)) return;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    try {
      this.ws = new WebSocket(`${proto}//${location.host}/ws`);
    } catch (e) {
      this.scheduleReconnect();
      return;
    }
    this.ws.onopen = () => {
      this.connected = true;
      // Re-subscribe existing listeners
      for (const [jobId] of this.listeners) {
        if (jobId !== '*') {
          this.ws.send(JSON.stringify({ type: 'subscribe', job_ids: [jobId] }));
        }
      }
    };
    this.ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const jobId = msg.job_id;
      if (jobId) {
        const cbs = this.listeners.get(jobId);
        if (cbs) cbs.forEach(cb => cb(msg));
        const wildcard = this.listeners.get('*');
        if (wildcard) wildcard.forEach(cb => cb(msg));
      }
    };
    this.ws.onclose = () => {
      this.connected = false;
      this.scheduleReconnect();
    };
    this.ws.onerror = () => {
      this.connected = false;
    };
  }
  scheduleReconnect() {
    if (this.reconnectTimer) return;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.connect();
    }, 2000);
  }
  subscribe(jobId, cb) {
    if (!this.listeners.has(jobId)) this.listeners.set(jobId, []);
    this.listeners.get(jobId).push(cb);
    if (this.ws && this.ws.readyState === WebSocket.OPEN && jobId !== '*') {
      this.ws.send(JSON.stringify({ type: 'subscribe', job_ids: [jobId] }));
    }
  }
  unsubscribe(jobId) {
    this.listeners.delete(jobId);
    if (this.ws && this.ws.readyState === WebSocket.OPEN && jobId !== '*') {
      this.ws.send(JSON.stringify({ type: 'unsubscribe', job_ids: [jobId] }));
    }
  }
  unsubscribeAll() {
    const ids = [...this.listeners.keys()].filter(k => k !== '*');
    this.listeners.clear();
    if (this.ws && this.ws.readyState === WebSocket.OPEN && ids.length > 0) {
      this.ws.send(JSON.stringify({ type: 'unsubscribe', job_ids: ids }));
    }
  }
}

const wsClient = new WSClient();

// ===================================================================
// Router
// ===================================================================
function navigateTo(path) { location.hash = path; }

function route() {
  const hash = (location.hash || '#/').slice(1);
  const qIdx = hash.indexOf('?');
  const path = qIdx >= 0 ? hash.slice(0, qIdx) : hash;
  const params = new URLSearchParams(qIdx >= 0 ? hash.slice(qIdx + 1) : '');
  if (jobsPollingTimer && path !== '/jobs') {
    clearInterval(jobsPollingTimer);
    jobsPollingTimer = null;
  }
  if (isDashboard) {
    refreshDashboardContext().catch(() => {});
  }

  updateActiveTab(path);

  if (path === '/' || path === '') {
    showHeaderSearch(false);
    if (isDashboard) { renderOverview(); } else { renderSearchHome(); }
  } else if (path === '/pipeline' && isDashboard) {
    showHeaderSearch(false);
    renderPipeline();
  } else if (path === '/jobs' && isDashboard) {
    showHeaderSearch(false);
    renderJobs();
  } else if (path === '/search') {
    const q = params.get('q') || '';
    const engine = params.get('engine') || '';
    if (q) {
      showHeaderSearch(true, q, engine);
      doSearchWithRender(q, parseInt(params.get('offset') || '0', 10), engine);
    } else {
      if (engine) state.searchEngine = engine;
      showHeaderSearch(false);
      renderSearchHome();
    }
  } else if (path === '/warc' && isDashboard) {
    showHeaderSearch(false);
    renderWARC();
  } else if (path.startsWith('/warc/') && isDashboard) {
    showHeaderSearch(false);
    const idx = path.split('/')[2] || '';
    renderWARCDetail(idx);
  } else if (path.startsWith('/browse')) {
    const shard = path.split('/')[2] || '';
    showHeaderSearch(false);
    renderBrowse(shard);
  } else if (path.startsWith('/doc/')) {
    const parts = path.split('/');
    const shard = parts[2];
    const docid = parts.slice(3).join('/');
    showHeaderSearch(true, state.query, state.searchEngine);
    renderDoc(shard, docid);
  } else if (path === '/crawls' && isDashboard) {
    showHeaderSearch(false);
    renderCrawls();
  } else {
    showHeaderSearch(false);
    if (isDashboard) { renderOverview(); } else { renderSearchHome(); }
  }
}

function updateActiveTab(path) {
  let activeTab = isDashboard ? 'overview' : 'search';
  if (path === '/pipeline') activeTab = 'pipeline';
  else if (path === '/jobs') activeTab = 'jobs';
  else if (path === '/search' || path === '/' && !isDashboard || path.startsWith('/doc/')) activeTab = 'search';
  else if (path === '/warc' || path.startsWith('/warc/')) activeTab = 'warc';
  else if (path.startsWith('/browse')) activeTab = 'browse';
  else if (path === '/crawls') activeTab = 'crawls';
  else if (path === '/' && isDashboard) activeTab = 'overview';

  document.querySelectorAll('#main-nav a[data-tab]').forEach(a => {
    if (a.dataset.tab === activeTab) {
      a.className = 'text-sm pb-1 tab-active transition-colors cursor-pointer';
    } else {
      a.className = 'text-sm pb-1 tab-inactive transition-colors cursor-pointer';
    }
  });
}

function showHeaderSearch(visible, value, engine) {
  const el = document.getElementById('header-search');
  const input = document.getElementById('header-search-input');
  if (visible) {
    el.classList.remove('hidden');
    el.classList.add('flex');
    if (value !== undefined) input.value = value;
    if (engine) state.searchEngine = engine;
    syncSearchEngineControls();
  } else {
    el.classList.add('hidden');
    el.classList.remove('flex');
  }
}

// ===================================================================
// API Helpers
// ===================================================================
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function apiPost(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const body = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function apiDelete(url) {
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiSearch(q, limit = 20, offset = 0, engine = '') {
  const engineQ = engine ? `&engine=${encodeURIComponent(engine)}` : '';
  return apiFetch(`/api/search?q=${encodeURIComponent(q)}&limit=${limit}&offset=${offset}${engineQ}`);
}

async function apiStats(engine = '') {
  const engineQ = engine ? `?engine=${encodeURIComponent(engine)}` : '';
  return apiFetch('/api/stats' + engineQ);
}

async function apiDoc(shard, docid) {
  return apiFetch(`/api/doc/${shard}/${encodeURIComponent(docid)}`);
}

async function apiBrowse(shard = '') {
  const url = shard ? `/api/browse?shard=${encodeURIComponent(shard)}` : '/api/browse';
  return apiFetch(url);
}

async function apiOverview() {
  return apiFetch('/api/overview');
}

async function apiMetaStatus(crawl = '') {
  const url = crawl ? `/api/meta/status?crawl=${encodeURIComponent(crawl)}` : '/api/meta/status';
  return apiFetch(url);
}

async function apiMetaRefresh(crawl = '', force = true) {
  return apiPost('/api/meta/refresh', { crawl, force });
}

async function apiEngines() {
  return apiFetch('/api/engines');
}

async function apiJobs() {
  return apiFetch('/api/jobs');
}

async function apiCrawls() {
  return apiFetch('/api/crawls');
}

async function apiWARCList(opts = {}) {
  const params = new URLSearchParams();
  if (opts.offset !== undefined) params.set('offset', String(opts.offset));
  if (opts.limit !== undefined) params.set('limit', String(opts.limit));
  if (opts.q) params.set('q', opts.q);
  if (opts.crawl) params.set('crawl', opts.crawl);
  const suffix = params.toString() ? `?${params.toString()}` : '';
  return apiFetch('/api/warc' + suffix);
}

async function apiWARCDetail(index, crawl = '') {
  const suffix = crawl ? `?crawl=${encodeURIComponent(crawl)}` : '';
  return apiFetch(`/api/warc/${encodeURIComponent(index)}${suffix}`);
}

async function apiWARCAction(index, payload) {
  return apiPost(`/api/warc/${encodeURIComponent(index)}/action`, payload || {});
}

async function apiCreateJob(cfg) {
  return apiPost('/api/jobs', cfg);
}

async function apiCancelJob(id) {
  return apiDelete(`/api/jobs/${id}`);
}

function currentSearchEngine() {
  if (state.searchEngine) return state.searchEngine;
  if (state.stats && state.stats.engine) return state.stats.engine;
  if (state.engines && state.engines.length > 0) return state.engines[0];
  return 'duckdb';
}

function searchEngineOptions() {
  const engines = (state.engines && state.engines.length > 0) ? state.engines.slice() : [currentSearchEngine()];
  const selected = currentSearchEngine();
  return engines.map(e => `<option value="${esc(e)}"${e === selected ? ' selected' : ''}>${esc(e)}</option>`).join('');
}

function syncSearchEngineControls() {
  const selected = currentSearchEngine();
  const ids = ['header-search-engine', 'home-search-engine'];
  for (const id of ids) {
    const el = $(id);
    if (!el) continue;

function buildSearchURL(query, offset = 0) {
  const params = new URLSearchParams();
  params.set('q', query);
  if (offset > 0) params.set('offset', String(offset));
  const engine = currentSearchEngine();
  if (engine) params.set('engine', engine);
  return `/search?${params.toString()}`;
}

function applySearchEngine(engine) {
  state.searchEngine = (engine || '').trim();
  syncSearchEngineControls();
  if (state.query) {
    navigateTo(buildSearchURL(state.query, 0));
    return;

  if (state.currentPage === 'search') {

  }
}

// ===================================================================
// Utilities
// ===================================================================
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(snippet, query) {
  if (!snippet || !query) return esc(snippet || '');
  const terms = query.split(/\s+/).filter(t => t.length > 1);
  let html = esc(snippet);
  for (const term of terms) {
    html = html.replace(new RegExp(`(${escRegex(term)})`, 'gi'), '<mark>$1</mark>');
  }
  return html;
}

function fmtBytes(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function docTitle(docid) {
  let name = docid.replace(/\.md$/i, '').replace(/[-_]+/g, ' ');
  try { name = decodeURIComponent(name); } catch(e) {}
  return name.length > 80 ? name.slice(0, 80) + '\u2026' : name;
}

function $(id) { return document.getElementById(id); }

function fmtDuration(startStr, endStr) {
  const start = new Date(startStr);
  const end = endStr ? new Date(endStr) : new Date();
  const ms = end - start;
  if (ms < 1000) return ms + 'ms';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const rs = s % 60;
  return m + 'm ' + rs + 's';
}

function statusClass(status) {
  switch (status) {
    case 'running': return 'status-running';
    case 'completed': return 'status-completed';
    case 'failed': return 'status-failed';
    case 'cancelled': return 'status-cancelled';
    case 'queued': return 'status-queued';
    default: return 'status-default';
  }
}

function fmtPct(value, total) {
  if (!total || total <= 0) return '0%';
  return `${Math.round((value / total) * 100)}%`;
}

function statusChip(label, ok) {
  const cls = ok ? 'ui-chip-ok' : 'ui-chip-off';
  return `<span class="ui-chip ${cls}">${label}</span>`;
}

function renderBars(rows) {
  const max = rows.reduce((acc, r) => Math.max(acc, r.value || 0), 0) || 1;
  return `
    <div class="space-y-2">
      ${rows.map(r => `
        <div class="flex items-center gap-3">
          <span class="w-24 shrink-0 text-[11px] font-mono ui-subtle">${esc(r.label)}</span>
          <div class="flex-1 progress-track">
            <div class="progress-fill" style="width:${Math.max(2, ((r.value || 0) / max) * 100)}%"></div>
          </div>
          <span class="w-24 shrink-0 text-right text-[11px] font-mono ui-subtle">${esc(r.text)}</span>
        </div>`).join('')}
    </div>`;
}

function parseISOTime(s) {
  if (!s) return null;
  const t = new Date(s);
  if (isNaN(t.getTime())) return null;
  return t;
}

function fmtRelativeTime(iso) {
  const t = parseISOTime(iso);
  if (!t) return '\u2014';
  const sec = Math.floor((Date.now() - t.getTime()) / 1000);
  if (sec < 5) return 'just now';
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  return `${day}d ago`;
}

function metaContext() {
  const o = state.overview || {};
  const s = state.metaStatus || {};
  const generatedAt = o.meta_generated_at || s.finished_at || '';
  const stale = !!o.meta_stale;
  const refreshing = !!o.meta_refreshing || !!s.refreshing;
  const backend = o.meta_backend || s.backend || 'scan-fallback';
  const ttlMS = s.refresh_ttl_ms || 0;
  return { generatedAt, stale, refreshing, backend, ttlMS, lastError: o.meta_last_error || s.last_error || '' };
}

function renderMetaSummaryLine() {
  const m = metaContext();
  const bits = [];
  bits.push(`meta:${m.backend}`);
  bits.push(`updated:${fmtRelativeTime(m.generatedAt)}`);
  if (m.ttlMS > 0) bits.push(`ttl:${Math.round(m.ttlMS / 1000)}s`);
  bits.push(`stale:${m.stale ? 'yes' : 'no'}`);
  if (m.refreshing) bits.push('refreshing');
  if (m.lastError) bits.push(`error:${m.lastError}`);
  return bits.join(' · ');
}

function updateHeaderMetaChip() {
  if (!isDashboard) return;
  const chip = $('header-meta');
  const btn = $('header-meta-refresh');
  if (!chip || !btn) return;
  chip.classList.remove('hidden');
  btn.classList.remove('hidden');
  chip.textContent = renderMetaSummaryLine();
}

async function refreshDashboardMeta(force = false) {
  if (!isDashboard) return;
  const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';
  try {
    await apiMetaRefresh(crawl, force);
  } catch (_) {
    // Ignore; status line shows last known error state from /api/meta/status.
  }
  await refreshDashboardContext();
}

async function refreshDashboardContext() {
  if (!isDashboard) return;
  const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';
  const [metaStatus, overview] = await Promise.all([
    apiMetaStatus(crawl).catch(() => null),
    apiOverview().catch(() => null),
  ]);
  if (metaStatus) state.metaStatus = metaStatus;
  if (overview) {
    state.overview = overview;
    state.overviewLoadedAt = Date.now();
  }
  if (state.overview && state.overview.meta_stale && !state.overview.meta_refreshing) {
    await apiMetaRefresh(crawl, false).catch(() => {});
  }
  updateHeaderMetaChip();
}

let metaWatchdogTimer = null;
function startMetaWatchdog() {
  if (!isDashboard) return;
  if (metaWatchdogTimer) clearInterval(metaWatchdogTimer);
  const tick = () => refreshDashboardContext().catch(() => {});
  tick();
  metaWatchdogTimer = setInterval(tick, 20000);
}

  el.innerHTML = `
    <div class="surface-soft px-4 py-3 mb-4">

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

    </div>

    <div class="flex gap-3 mt-6">
      <a href="#/pipeline" class="ui-btn px-4 py-2 text-sm">Open Pipeline</a>

    </div>`;
}

async function refreshOverviewMeta() {

function countActive(jobs) {
  return jobs.filter(j => j.status === 'running' || j.status === 'queued').length;
}

function renderJobList(jobs) {
  const active = jobs.filter(j => j.status === 'running' || j.status === 'queued');
  if (active.length === 0) return '';
  return active.map(j => renderJobItem(j)).join('');
}

function renderJobItem(j) {
  const pct = Math.round((j.progress || 0) * 100);
  const rateStr = j.rate > 0 ? ` &middot; ${j.rate.toFixed(0)} docs/s` : '';
  const cancelBtn = (j.status === 'running' || j.status === 'queued')
    ? `<button onclick="cancelJob('${esc(j.id)}')" class="text-xs ui-link ml-2">cancel</button>`

  return `

      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-mono ui-subtle">${esc(j.id)} &middot; <span class="${statusClass(j.status)}">${esc(j.status)}</span>${rateStr}</span>
        <span class="text-xs font-mono ui-subtle">${pct}%${cancelBtn}</span>
      </div>
      <div class="progress-track mb-1">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="text-xs ui-subtle truncate">${esc(j.message || '')}</div>

function renderJobHistory(jobs) {
  if (!jobs || jobs.length === 0) {
    return '<div class="ui-empty">No jobs yet.</div>';

  return `

      <table class="w-full text-sm ui-table">
        <thead>
          <tr>
            <th class="text-left px-4 py-2 text-xs font-mono">ID</th>

            <th class="text-left px-4 py-2 text-xs font-mono">Message</th>
            <th class="text-right px-4 py-2 text-xs font-mono">Elapsed</th>
          </tr>
        </thead>

          ${jobs.map(j => `

            </tr>`).join('')}

function submitJob(event, type) {
  event.preventDefault();
  const form = event.target;
  const files = form.elements.files ? form.elements.files.value : '0';

  const cfg = { type, files };

  if (type === 'markdown') {
    cfg.fast = form.elements.fast ? form.elements.fast.checked : false;
  } else if (type === 'pack') {
    cfg.format = form.elements.format ? form.elements.format.value : 'parquet';
  } else if (type === 'index') {
    cfg.engine = form.elements.engine ? form.elements.engine.value : 'duckdb';
    cfg.source = form.elements.source ? form.elements.source.value : 'files';
  }

  startJob(cfg);
  return false;
}

async function startJob(cfg) {
  try {
    const job = await apiCreateJob(cfg);
    // Add to state
    if (!state.jobs) state.jobs = [];
    state.jobs.unshift(job);

    // Subscribe to updates
    wsClient.subscribe(job.id, (msg) => onJobUpdate(msg));

    // Re-render job views if visible.
    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    } else if (state.currentPage === 'jobs') {
      const summary = $('jobs-summary');
      if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }
  } catch (e) {
    alert('Failed to start job: ' + e.message);
  }
}

async function cancelJob(id) {
  try {
    await apiCancelJob(id);
    // Update local state
    const job = state.jobs && state.jobs.find(j => j.id === id);
    if (job) {
      job.status = 'cancelled';
      job.ended_at = new Date().toISOString();
    }
    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    } else if (state.currentPage === 'jobs') {
      const summary = $('jobs-summary');
      if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }
  } catch (e) {
    alert('Failed to cancel job: ' + e.message);
  }
}

function onJobUpdate(msg) {
  if (!state.jobs) return;
  const job = state.jobs.find(j => j.id === msg.job_id);
  if (!job) return;

  if (msg.type === 'job_progress') {
    job.progress = msg.progress;
    job.message = msg.message;
    job.rate = msg.rate || 0;

    // Update in-place for active job rows on pipeline/jobs pages.
    if (state.currentPage === 'pipeline' || state.currentPage === 'jobs') {
      updateJobInPlace(job);
    }
  } else if (msg.type === 'job_update') {
    job.status = msg.status;
    if (msg.error) job.error = msg.error;
    if (msg.status === 'completed' || msg.status === 'failed' || msg.status === 'cancelled') {
      job.ended_at = new Date().toISOString();
      if (msg.status === 'completed') job.progress = 1.0;
    }

    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    } else if (state.currentPage === 'jobs') {
      const summary = $('jobs-summary');
      if (summary) summary.textContent = renderJobsSummaryLine(state.jobs || []);
      renderJobsContent();
    }
  }
}

function updateJobInPlace(job) {
  const el = $('job-' + job.id);
  if (!el) return;
  const pct = Math.round((job.progress || 0) * 100);
  const rateStr = job.rate > 0 ? ` &middot; ${job.rate.toFixed(0)} docs/s` : '';
  const cancelBtn = (job.status === 'running' || job.status === 'queued')
    ? `<button onclick="cancelJob('${esc(job.id)}')" class="text-xs ui-link ml-2">cancel</button>`
    : '';

  el.innerHTML = `
    <div class="flex items-center justify-between mb-1">
      <span class="text-xs font-mono ui-subtle">${esc(job.id)} &middot; <span class="${statusClass(job.status)}">${esc(job.status)}</span>${rateStr}</span>
      <span class="text-xs font-mono ui-subtle">${pct}%${cancelBtn}</span>
    </div>
    <div class="progress-track mb-1">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="text-xs ui-subtle truncate">${esc(job.message || '')}</div>`;
}

function jobCounts(jobs) {
  const counts = { total: 0, queued: 0, running: 0, completed: 0, failed: 0, cancelled: 0 };
  for (const j of (jobs || [])) {
    counts.total += 1;
    if (counts[j.status] !== undefined) counts[j.status] += 1;
  }
  return counts;
}

function renderJobsSummaryLine(jobs) {
  const c = jobCounts(jobs);
  return `jobs:${c.total} · running:${c.running} · queued:${c.queued} · completed:${c.completed} · failed:${c.failed} · cancelled:${c.cancelled}`;
}

function renderJobsContent() {
  const el = $('jobs-content');

  const active = jobs.filter(j => j.status === 'running' || j.status === 'queued');

  const cards = [

function renderSearchResults(data, query, offset) {
  if (!data || !data.hits || data.hits.length === 0) {
    $('main').innerHTML = `
      <div class="py-20 text-center anim-fade-in max-w-3xl mx-auto">
        <p class="ui-subtle text-sm mb-1">Nothing matched <strong>&laquo;${esc(query)}&raquo;</strong></p>
        <p class="ui-subtle text-xs">Try different terms or broaden your query</p>
      </div>`;
    return;
  }

  const pageSize = 20;
  const page = Math.floor(offset / pageSize) + 1;
  const totalPages = Math.ceil((data.total || data.hits.length) / pageSize);

  const results = data.hits.map((hit, i) => `
    <a href="#/doc/${hit.shard || '00000'}/${encodeURIComponent(hit.doc_id)}"
       class="block result-item py-6 -mx-2 px-2 cursor-pointer anim-fade-up"
       style="animation-delay:${i * 30}ms">
      <div class="flex items-baseline justify-between gap-4 mb-1">
        <span class="text-base font-medium truncate">${esc(docTitle(hit.doc_id))}</span>
        <span class="text-xs font-mono ui-subtle shrink-0">${hit.score ? hit.score.toFixed(2) : ''}</span>
      </div>
      <div class="text-xs font-mono ui-subtle mb-2">${esc(hit.shard || '')} &middot; ${esc(hit.doc_id)}</div>
      ${hit.snippet ? `<p class="text-sm ui-subtle leading-relaxed line-clamp-3">${highlight(hit.snippet, query)}</p>` : ''}
    </a>`).join('<div class="border-t"></div>');

  $('main').innerHTML = `
    <div class="py-8 max-w-3xl mx-auto anim-fade-in">
      <div class="meta-line mb-6">
        ${(data.total || data.hits.length).toLocaleString()} results${data.elapsed_ms ? ` &middot; ${data.elapsed_ms}ms` : ''}${data.shards ? ` &middot; ${data.shards} shard${data.shards!==1?'s':''}` : ''}${data.engine ? ` &middot; ${esc(data.engine)}` : ''}
      </div>
      <div>${results}</div>
      ${totalPages > 1 ? renderSearchPagination(page, totalPages, query, pageSize, data.engine || currentSearchEngine()) : ''}
    </div>`;
}

function renderSearchPagination(cur, total, query, pageSize, engine) {
  let pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages.push(1);
    if (cur > 3) pages.push('\u2026');
    for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) pages.push(i);
    if (cur < total - 2) pages.push('\u2026');
    pages.push(total);
  }

  const btn = (p, active) => {
    if (p === '\u2026') return `<span class="px-2 py-1 text-xs ui-subtle">\u2026</span>`;
    const cls = active
      ? 'px-2 py-1 text-xs font-mono font-medium'
      : 'px-2 py-1 text-xs font-mono ui-link transition-colors';
    const params = new URLSearchParams({ q: query, offset: String((p-1)*pageSize), engine: engine || currentSearchEngine() });
    return `<a href="#/search?${params.toString()}" class="${cls}">${p}</a>`;
  };

  const prevParams = new URLSearchParams({ q: query, offset: String((cur-2)*pageSize), engine: engine || currentSearchEngine() });
  const nextParams = new URLSearchParams({ q: query, offset: String(cur*pageSize), engine: engine || currentSearchEngine() });
  return `
    <div class="flex items-center justify-center gap-1 pt-8 pb-4">
      ${cur > 1 ? `<a href="#/search?${prevParams.toString()}" class="text-xs font-mono ui-link transition-colors mr-2">&larr; prev</a>` : ''}
      ${pages.map(p => btn(p, p === cur)).join('')}
      ${cur < total ? `<a href="#/search?${nextParams.toString()}" class="text-xs font-mono ui-link transition-colors ml-2">next &rarr;</a>` : ''}
    </div>`;
}

        <div class="surface p-3">
          <div class="text-[11px] font-mono ui-subtle mb-1">Total on Disk</div>

        </div>
      </div>
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div class="surface p-3">
          <div class="text-[11px] font-mono ui-subtle mb-2">Phase Size</div>

        </div>
        <div class="surface p-3">
          <div class="text-[11px] font-mono ui-subtle mb-2">Phase Status</div>
          <div class="flex flex-wrap gap-2 mb-2">

            ${statusChip('markdown', !!w.has_markdown)}
            ${statusChip('pack', !!w.has_pack)}
            ${statusChip('index', !!w.has_fts)}
          </div>
          <div class="text-xs font-mono ui-subtle">docs: ${(w.markdown_docs || 0).toLocaleString()} · updated: ${w.updated_at ? fmtRelativeTime(w.updated_at) : '\u2014'}</div>
        </div>
      </div>
      <div class="surface p-3 mb-4">
        <div class="text-[11px] font-mono ui-subtle mb-3">Actions</div>
        <div class="grid md:grid-cols-2 gap-3">
          <div class="space-y-2">
            <button onclick="warcAction('${esc(w.index)}','download',{},true)" class="ui-btn w-full px-3 py-2 text-xs font-mono">Download</button>
            <button onclick="warcAction('${esc(w.index)}','markdown',{fast:false},true)" class="ui-btn w-full px-3 py-2 text-xs font-mono">Markdown</button>

              <button onclick="warcAction('${esc(w.index)}','pack',{format:$('warc-pack-format').value},true)" class="ui-btn px-3 py-2 text-xs font-mono">Pack</button>

              <button onclick="warcAction('${esc(w.index)}','index',{engine:$('warc-index-engine').value,source:$('warc-index-source').value},true)" class="ui-btn px-3 py-2 text-xs font-mono">Index</button>
            </div>
            <div class="flex items-center gap-2">

}

async function warcAction(index, action, extra = {}, refreshDetail = false) {
  const msg = $('warc-action-msg');
  if (msg) msg.textContent = `running ${action} on ${index}...`;
  try {
    const res = await apiWARCAction(index, { action, ...extra });
    if (res && res.job && res.job.id) {
      if (!state.jobs) state.jobs = [];
      state.jobs.unshift(res.job);
      wsClient.subscribe(res.job.id, (m) => onJobUpdate(m));
      if (msg) msg.textContent = `job ${res.job.id} started: ${action}`;
    } else {
      if (msg) msg.textContent = `action ${action} completed`;
    }
    if (refreshDetail) {
      await renderWARCDetail(index);
    } else if (state.currentPage === 'warc') {
      await renderWARC(state.warcOffset || 0, state.warcQuery || '');
    }
  } catch (e) {
    if (msg) msg.textContent = `action failed: ${e.message}`;
  }
}

// ===================================================================
// Tab 5: Browse
// ===================================================================
async function renderBrowse(shard) {
  state.currentPage = 'browse';
  state.browseShard = shard;
  $('main').innerHTML = `
    <div class="page-shell anim-fade-in">
      <div class="page-header mb-4">
        <h1 class="page-title">Browse</h1>
        ${isDashboard ? `<button onclick="refreshDashboardMeta(true)" class="ui-btn px-3 py-2 text-xs font-mono">Refresh Metadata</button>` : ''}
      </div>
      ${isDashboard ? `<div class="meta-line mb-5" id="browse-meta">loading metadata...</div>` : ''}
      <div class="surface flex min-h-[calc(100vh-10rem)]">
      <aside class="w-56 shrink-0 p-4 ui-border-r">
        <div class="text-xs font-mono ui-subtle mb-4 uppercase tracking-wider">Shards</div>
        <div id="shard-list" class="space-y-1">
          <div class="ui-empty">loading\u2026</div>
        </div>
      </aside>
      <div class="flex-1 min-w-0 p-4" id="browse-content">
        <div class="ui-empty">loading\u2026</div>
      </div>
      </div>
    </div>`;

  try {
    if (isDashboard) {
      await refreshDashboardContext().catch(() => {});
      const meta = $('browse-meta');
      if (meta) {
        const docEstimate = (state.overview && state.overview.md_doc_estimate) ? state.overview.md_doc_estimate.toLocaleString() : '0';
        meta.textContent = `${renderMetaSummaryLine()} · docs:${docEstimate}`;
      }
    }
    const data = await apiBrowse();
    state.browseShards = data.shards || [];
    renderShardList(shard);
    if (shard) {
      loadShardFiles(shard);
    } else if (state.browseShards.length > 0) {
      navigateTo('/browse/' + state.browseShards[0].name);
    } else {
      $('browse-content').innerHTML = `<div class="ui-empty">No index yet. Run <code>search cc fts index</code> to get started.</div>`;
    }
  } catch(e) {
    $('browse-content').innerHTML = `<div class="text-xs text-red-400 py-8">${esc(e.message)}</div>`;
  }
}

function renderShardList(active) {
  const el = $('shard-list');
  if (!el || !state.browseShards) return;
  el.innerHTML = state.browseShards.map(s => `
    <a href="#/browse/${s.name}"
       class="flex items-center justify-between py-1 text-xs font-mono cursor-pointer ${s.name === active ? 'shard-active font-medium' : 'shard-item'}">
      <span>${esc(s.name)}</span>
      <span class="ui-subtle">${(s.file_count || '').toLocaleString()}</span>
    </a>`).join('');
}

async function loadShardFiles(shard) {
  const el = $('browse-content');
  if (!el) return;
  el.innerHTML = `<div class="ui-empty">loading\u2026</div>`;

  try {
    const data = await apiBrowse(shard);
    state.browseFiles = data.files || [];
    el.innerHTML = `
      <div class="flex items-baseline justify-between mb-4">
        <span class="text-sm font-medium">${esc(shard)}</span>
        <span class="meta-line">${state.browseFiles.length} files</span>
      </div>
      <div class="space-y-1">
        ${state.browseFiles.map((f, i) => `
          <a href="#/doc/${shard}/${encodeURIComponent(f.name)}"
             class="flex items-center justify-between py-2 px-2 -mx-2 text-sm file-row cursor-pointer anim-fade-up"
             style="animation-delay:${Math.min(i, 20) * 15}ms">
            <span class="font-mono text-xs truncate ui-subtle">${esc(f.name)}</span>
            <span class="text-xs font-mono ui-subtle shrink-0 ml-4">${f.size ? fmtBytes(f.size) : ''}</span>
          </a>`).join('')}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="text-xs text-red-400 py-4">${esc(e.message)}</div>`;
  }
}

// ===================================================================
// Document Viewer
// ===================================================================
async function renderDoc(shard, docid) {
  state.currentPage = 'doc';
  const main = $('main');
  main.innerHTML = `
    <div class="py-8 max-w-3xl mx-auto anim-fade-in">
      <a href="#" onclick="history.back();return false" class="text-xs ui-link transition-colors">&larr; Back</a>
      <div class="meta-line mt-3 mb-8">${esc(shard)} / ${esc(decodeURIComponent(docid))}</div>
      <div class="space-y-3">
        <div class="h-5 w-2/3 ui-skeleton"></div>
        <div class="h-4 w-full ui-skeleton"></div>
        <div class="h-4 w-full ui-skeleton"></div>
        <div class="h-4 w-4/5 ui-skeleton"></div>
      </div>
    </div>`;

  try {
    const data = await apiDoc(shard, docid);
    state.doc = data;
    main.innerHTML = `
      <div class="py-8 max-w-3xl mx-auto anim-fade-in">
        <a href="#" onclick="history.back();return false" class="text-xs ui-link transition-colors">&larr; Back</a>
        <div class="meta-line mt-3 mb-6">${esc(data.shard || shard)} / ${esc(data.doc_id || docid)}</div>

        <div class="flex items-center gap-6 mb-8 border-b pb-3">
          <button id="btn-rendered" onclick="showRendered()" class="text-xs pb-1 tab-active transition-colors">Rendered</button>
          <button id="btn-source" onclick="showSource()" class="text-xs pb-1 tab-inactive transition-colors">Source</button>
          <span class="meta-line ml-auto">
            ${data.word_count ? data.word_count.toLocaleString() + ' words' : ''}${data.word_count && data.size ? ' &middot; ' : ''}${data.size ? fmtBytes(data.size) : ''}
          </span>
        </div>

        <div id="doc-rendered" class="prose dark:prose-invert max-w-none prose-zinc prose-sm prose-headings:font-semibold prose-headings:tracking-tight prose-a:text-blue-600 dark:prose-a:text-blue-400 prose-code:text-sm prose-code:font-mono prose-img:max-w-full">
          ${data.html || '<p class="ui-subtle">No content</p>'}
        </div>
        <div id="doc-source" class="hidden">

      </div>`;
  } catch(e) {
    main.innerHTML = `
      <div class="py-16 text-center anim-fade-in">
        <p class="text-red-400 text-sm mb-1">Failed to load document</p>
        <p class="ui-subtle text-xs mb-4">${esc(e.message)}</p>
        <a href="#" onclick="history.back();return false" class="text-xs ui-link transition-colors">&larr; Back</a>
      </div>`;
  }
}

function showRendered() {
  $('doc-rendered').classList.remove('hidden');
  $('doc-source').classList.add('hidden');
  $('btn-rendered').className = 'text-xs pb-1 tab-active transition-colors';
  $('btn-source').className = 'text-xs pb-1 tab-inactive transition-colors';
}

function showSource() {
  $('doc-rendered').classList.add('hidden');
  $('doc-source').classList.remove('hidden');
  $('btn-source').className = 'text-xs pb-1 tab-active transition-colors';
  $('btn-rendered').className = 'text-xs pb-1 tab-inactive transition-colors';
}

async function renderCrawls() {
  state.currentPage = 'crawls';
  const main = $('main');
  main.innerHTML = `
    <div class="page-shell anim-fade-in">
      <div class="page-header">
        <h1 class="page-title">Crawls</h1>
        ${isDashboard ? `<button onclick="refreshDashboardMeta(true)" class="ui-btn px-3 py-2 text-xs font-mono">Refresh Metadata</button>` : ''}
      </div>
      ${isDashboard ? `<div id="crawls-meta" class="meta-line mb-5">loading metadata...</div>` : ''}
      <div id="crawls-content">
        <div class="ui-empty">loading...</div>
      </div>
    </div>`;

  try {
    if (isDashboard) {
      await refreshDashboardContext().catch(() => {});
      const m = $('crawls-meta');
      if (m) {
        const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '-';
        m.textContent = `active:${crawl} · ${renderMetaSummaryLine()}`;
      }
    }
    const data = await apiCrawls();
    state.crawls = data.crawls || [];
    renderCrawlsContent(state.crawls);
  } catch (e) {
    $('crawls-content').innerHTML = `
      <div class="surface p-6 text-center">
        <p class="text-sm ui-subtle mb-1">Could not load crawl list</p>
        <p class="text-xs font-mono text-red-400">${esc(e.message)}</p>
        <p class="text-xs ui-subtle mt-2">Check your internet connection or try again later.</p>
      </div>`;
  }
}

function renderCrawlsContent(crawls) {
  const el = $('crawls-content');
  if (!el) return;

  if (!crawls || crawls.length === 0) {
    el.innerHTML = '<div class="ui-empty">No crawls found.</div>';
    return;
  }
  const activeCrawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';

  el.innerHTML = `
    <div class="surface overflow-x-auto">
      <table class="w-full text-sm ui-table">
        <thead>
          <tr>
            <th class="text-left px-4 py-2 text-xs font-mono">Crawl ID</th>
            <th class="text-left px-4 py-2 text-xs font-mono">Name</th>
            <th class="text-left px-4 py-2 text-xs font-mono">From</th>
            <th class="text-left px-4 py-2 text-xs font-mono">To</th>
            <th class="text-right px-4 py-2 text-xs font-mono">Status</th>
          </tr>
        </thead>
        <tbody>
          ${crawls.map((c, i) => `
            <tr class="anim-fade-up" style="animation-delay:${i * 20}ms">
              <td class="px-4 py-2 font-mono text-xs">${esc(c.id || '')}</td>
              <td class="px-4 py-2 text-xs">${esc(c.name || '')}</td>
              <td class="px-4 py-2 font-mono text-xs ui-subtle">${formatCrawlDate(c.from)}</td>
              <td class="px-4 py-2 font-mono text-xs ui-subtle">${formatCrawlDate(c.to)}</td>
              <td class="px-4 py-2 text-right text-xs font-mono ${c.id === activeCrawl ? 'status-completed' : 'ui-subtle'}">${c.id === activeCrawl ? 'active' : ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="meta-line mt-3">${crawls.length} crawls total</div>`;
}

function formatCrawlDate(d) {
  if (!d) return '\u2014';
  // d could be ISO string or time.Time JSON
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return esc(String(d));
    return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch {
    return esc(String(d));
  }
}

// ===================================================================
// Error renderer
// ===================================================================
function renderError(msg) {
  $('main').innerHTML = `<div class="py-16 text-center anim-fade-in"><p class="text-red-400 text-sm">${esc(msg)}</p></div>`;
}

// ===================================================================
// Keyboard Shortcuts
// ===================================================================
document.addEventListener('keydown', (e) => {
  const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);

  // Cmd+K — focus search input
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const h = $('header-search-input');
    const home = $('home-search-input');
    if (home && !home.closest('.hidden')) { home.focus(); home.select(); }
    else if (h && !h.closest('.hidden')) { h.focus(); h.select(); }
    else {
      // Navigate to search tab if not there
      navigateTo('/search');
    }
  }

  // / — focus search (when not in input)
  if (e.key === '/' && !isInput) {
    e.preventDefault();
    const h = $('header-search-input');
    const home = $('home-search-input');
    if (home && !home.closest('.hidden')) home.focus();
    else if (h && !h.closest('.hidden')) h.focus();
    else navigateTo('/search');
  }

  // Escape — blur active input
  if (e.key === 'Escape') document.activeElement.blur();

  // Number keys — switch tabs (when not in input)
  if (!isInput && e.key >= '1' && e.key <= '7' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const tabs = isDashboard
      ? ['/', '/pipeline', '/jobs', '/search', '/warc', '/browse', '/crawls']
      : ['/search', '/browse'];
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < tabs.length) {
      e.preventDefault();
      navigateTo(tabs[idx]);
    }
  }
});

// ===================================================================
// Init
// ===================================================================
applyTheme();

// In search-only mode: hide dashboard tabs, adjust header title, narrow layout.
if (!isDashboard) {
  document.querySelectorAll('#main-nav a[data-tab]').forEach(a => {
    if (['overview', 'pipeline', 'jobs', 'warc', 'crawls'].includes(a.dataset.tab)) a.style.display = 'none';
  });
  const metaChip = $('header-meta');
  const metaBtn = $('header-meta-refresh');
  if (metaChip) metaChip.style.display = 'none';
  if (metaBtn) metaBtn.style.display = 'none';
  const logo = document.querySelector('header a[href="#/"]');
  if (logo) logo.textContent = 'FTS';
  const main = document.getElementById('main');
  if (main) { main.classList.remove('max-w-5xl', 'max-w-6xl'); main.classList.add('max-w-3xl'); }
} else {
  startMetaWatchdog();
}

// WebSocket only in dashboard mode.
if (isDashboard) { wsClient.connect(); }

window.addEventListener('hashchange', route);
route();
</script>
