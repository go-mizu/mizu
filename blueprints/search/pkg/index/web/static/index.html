          </button>

<script>
// ===================================================================
// Mode: injected by server — "dashboard" or "search"
// ===================================================================
const MODE = "__SERVER_MODE__";
const isDashboard = MODE === 'dashboard';

// ===================================================================
// State
// ===================================================================
const state = {
  query: '',
  searchEngine: '',
  results: null,
  stats: null,
  loading: false,
  currentPage: '',
  browseShards: null,
  browseFiles: null,
  browseShard: '',
  doc: null,
  theme: localStorage.getItem('fts-theme') || 'dark',
  overview: null,
  overviewLoadedAt: 0,
  metaStatus: null,
  jobs: null,
  engines: null,
  crawls: null,
};

// ===================================================================
// Theme
// ===================================================================
function applyTheme() {
  const html = document.documentElement;
  if (state.theme === 'dark') {
    html.classList.add('dark');
    html.classList.remove('light');
    document.getElementById('icon-sun').classList.remove('hidden');
    document.getElementById('icon-moon').classList.add('hidden');
  } else {
    html.classList.remove('dark');
    html.classList.add('light');
    document.getElementById('icon-sun').classList.add('hidden');
    document.getElementById('icon-moon').classList.remove('hidden');
  }
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('fts-theme', state.theme);
  applyTheme();
}

// ===================================================================
// WebSocket Client
// ===================================================================
class WSClient {
  constructor() {
    this.ws = null;
    this.listeners = new Map();
    this.connected = false;
    this.reconnectTimer = null;
  }
  connect() {
    if (this.ws && (this.ws.readyState === WebSocket.OPEN || this.ws.readyState === WebSocket.CONNECTING)) return;
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    try {
      this.ws = new WebSocket(`${proto}//${location.host}/ws`);
    } catch (e) {
      this.scheduleReconnect();
      return;
    }
    this.ws.onopen = () => {
      this.connected = true;
      // Re-subscribe existing listeners
      for (const [jobId] of this.listeners) {
        if (jobId !== '*') {
          this.ws.send(JSON.stringify({ type: 'subscribe', job_ids: [jobId] }));
        }
      }
    };
    this.ws.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const jobId = msg.job_id;
      if (jobId) {
        const cbs = this.listeners.get(jobId);
        if (cbs) cbs.forEach(cb => cb(msg));
        const wildcard = this.listeners.get('*');
        if (wildcard) wildcard.forEach(cb => cb(msg));
      }
    };
    this.ws.onclose = () => {
      this.connected = false;
      this.scheduleReconnect();
    };
    this.ws.onerror = () => {
      this.connected = false;
    };
  }
  scheduleReconnect() {
    if (this.reconnectTimer) return;
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.connect();
    }, 2000);
  }
  subscribe(jobId, cb) {
    if (!this.listeners.has(jobId)) this.listeners.set(jobId, []);
    this.listeners.get(jobId).push(cb);
    if (this.ws && this.ws.readyState === WebSocket.OPEN && jobId !== '*') {
      this.ws.send(JSON.stringify({ type: 'subscribe', job_ids: [jobId] }));
    }
  }
  unsubscribe(jobId) {
    this.listeners.delete(jobId);
    if (this.ws && this.ws.readyState === WebSocket.OPEN && jobId !== '*') {
      this.ws.send(JSON.stringify({ type: 'unsubscribe', job_ids: [jobId] }));
    }
  }
  unsubscribeAll() {
    const ids = [...this.listeners.keys()].filter(k => k !== '*');
    this.listeners.clear();
    if (this.ws && this.ws.readyState === WebSocket.OPEN && ids.length > 0) {
      this.ws.send(JSON.stringify({ type: 'unsubscribe', job_ids: ids }));
    }
  }
}

const wsClient = new WSClient();

// ===================================================================
// Router
// ===================================================================
function navigateTo(path) { location.hash = path; }

function route() {
  const hash = (location.hash || '#/').slice(1);
  const qIdx = hash.indexOf('?');
  const path = qIdx >= 0 ? hash.slice(0, qIdx) : hash;
  const params = new URLSearchParams(qIdx >= 0 ? hash.slice(qIdx + 1) : '');
  if (isDashboard) {
    refreshDashboardContext().catch(() => {});
  }

  updateActiveTab(path);

  if (path === '/' || path === '') {
    showHeaderSearch(false);
    if (isDashboard) { renderOverview(); } else { renderSearchHome(); }
  } else if (path === '/pipeline' && isDashboard) {
    showHeaderSearch(false);
    renderPipeline();
  } else if (path === '/search') {
    const q = params.get('q') || '';
    const engine = params.get('engine') || '';
    if (q) {
      showHeaderSearch(true, q, engine);
      doSearchWithRender(q, parseInt(params.get('offset') || '0', 10), engine);
    } else {
      if (engine) state.searchEngine = engine;
      showHeaderSearch(false);
      renderSearchHome();
    }
  } else if (path.startsWith('/browse')) {
    const shard = path.split('/')[2] || '';
    showHeaderSearch(false);
    renderBrowse(shard);
  } else if (path.startsWith('/doc/')) {
    const parts = path.split('/');
    const shard = parts[2];
    const docid = parts.slice(3).join('/');
    showHeaderSearch(true, state.query, state.searchEngine);
    renderDoc(shard, docid);
  } else if (path === '/crawls' && isDashboard) {
    showHeaderSearch(false);
    renderCrawls();
  } else {
    showHeaderSearch(false);
    if (isDashboard) { renderOverview(); } else { renderSearchHome(); }
  }
}

function updateActiveTab(path) {
  let activeTab = isDashboard ? 'overview' : 'search';
  if (path === '/pipeline') activeTab = 'pipeline';
  else if (path === '/search' || path === '/' && !isDashboard || path.startsWith('/doc/')) activeTab = 'search';
  else if (path.startsWith('/browse')) activeTab = 'browse';
  else if (path === '/crawls') activeTab = 'crawls';
  else if (path === '/' && isDashboard) activeTab = 'overview';

  document.querySelectorAll('#main-nav a[data-tab]').forEach(a => {
    if (a.dataset.tab === activeTab) {
      a.className = 'text-sm pb-1 tab-active transition-colors cursor-pointer';
    } else {
      a.className = 'text-sm pb-1 tab-inactive transition-colors cursor-pointer';
    }
  });
}

function showHeaderSearch(visible, value, engine) {
  const el = document.getElementById('header-search');
  const input = document.getElementById('header-search-input');
  if (visible) {
    el.classList.remove('hidden');
    el.classList.add('flex');
    if (value !== undefined) input.value = value;
    if (engine) state.searchEngine = engine;
    syncSearchEngineControls();
  } else {
    el.classList.add('hidden');
    el.classList.remove('flex');
  }
}

// ===================================================================
// API Helpers
// ===================================================================
async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function apiPost(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!res.ok) {
    const body = await res.text();
    let msg = `HTTP ${res.status}`;
    try { const j = JSON.parse(body); if (j.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function apiDelete(url) {
  const res = await fetch(url, { method: 'DELETE' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiSearch(q, limit = 20, offset = 0, engine = '') {
  const engineQ = engine ? `&engine=${encodeURIComponent(engine)}` : '';
  return apiFetch(`/api/search?q=${encodeURIComponent(q)}&limit=${limit}&offset=${offset}${engineQ}`);
}

async function apiStats(engine = '') {
  const engineQ = engine ? `?engine=${encodeURIComponent(engine)}` : '';
  return apiFetch('/api/stats' + engineQ);
}

async function apiDoc(shard, docid) {
  return apiFetch(`/api/doc/${shard}/${encodeURIComponent(docid)}`);
}

async function apiBrowse(shard = '') {
  const url = shard ? `/api/browse?shard=${encodeURIComponent(shard)}` : '/api/browse';
  return apiFetch(url);
}

async function apiOverview() {
  return apiFetch('/api/overview');
}

async function apiMetaStatus(crawl = '') {
  const url = crawl ? `/api/meta/status?crawl=${encodeURIComponent(crawl)}` : '/api/meta/status';
  return apiFetch(url);
}

async function apiMetaRefresh(crawl = '', force = true) {
  return apiPost('/api/meta/refresh', { crawl, force });
}

async function apiEngines() {
  return apiFetch('/api/engines');
}

async function apiJobs() {
  return apiFetch('/api/jobs');
}

async function apiCrawls() {
  return apiFetch('/api/crawls');
}

async function apiCreateJob(cfg) {
  return apiPost('/api/jobs', cfg);
}

async function apiCancelJob(id) {
  return apiDelete(`/api/jobs/${id}`);
}

function currentSearchEngine() {
  if (state.searchEngine) return state.searchEngine;
  if (state.stats && state.stats.engine) return state.stats.engine;
  if (state.engines && state.engines.length > 0) return state.engines[0];
  return 'duckdb';
}

function searchEngineOptions() {
  const engines = (state.engines && state.engines.length > 0) ? state.engines.slice() : [currentSearchEngine()];
  const selected = currentSearchEngine();
  return engines.map(e => `<option value="${esc(e)}"${e === selected ? ' selected' : ''}>${esc(e)}</option>`).join('');
}

function syncSearchEngineControls() {
  const selected = currentSearchEngine();
  const ids = ['header-search-engine', 'home-search-engine'];
  for (const id of ids) {
    const el = $(id);
    if (!el) continue;
    el.innerHTML = searchEngineOptions();
    el.value = selected;
  }
}

async function ensureEnginesLoaded() {
  if (state.engines !== null) return state.engines;
  try {
    const d = await apiEngines();
    state.engines = d.engines || [];
  } catch {
    state.engines = [];
  }
  syncSearchEngineControls();
  return state.engines;
}

function buildSearchURL(query, offset = 0) {
  const params = new URLSearchParams();
  params.set('q', query);
  if (offset > 0) params.set('offset', String(offset));
  const engine = currentSearchEngine();
  if (engine) params.set('engine', engine);
  return `/search?${params.toString()}`;
}

function applySearchEngine(engine) {
  state.searchEngine = (engine || '').trim();
  syncSearchEngineControls();
  if (state.query) {
    navigateTo(buildSearchURL(state.query, 0));
    return;
  }
  if (state.currentPage === 'search') {
    loadHomeStats();
  }
}

// ===================================================================
// Utilities
// ===================================================================
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(snippet, query) {
  if (!snippet || !query) return esc(snippet || '');
  const terms = query.split(/\s+/).filter(t => t.length > 1);
  let html = esc(snippet);
  for (const term of terms) {
    html = html.replace(new RegExp(`(${escRegex(term)})`, 'gi'), '<mark>$1</mark>');
  }
  return html;
}

function fmtBytes(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

function docTitle(docid) {
  let name = docid.replace(/\.md$/i, '').replace(/[-_]+/g, ' ');
  try { name = decodeURIComponent(name); } catch(e) {}
  return name.length > 80 ? name.slice(0, 80) + '\u2026' : name;
}

function $(id) { return document.getElementById(id); }

function fmtDuration(startStr, endStr) {
  const start = new Date(startStr);
  const end = endStr ? new Date(endStr) : new Date();
  const ms = end - start;
  if (ms < 1000) return ms + 'ms';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  const rs = s % 60;
  return m + 'm ' + rs + 's';
}

function statusClass(status) {
  switch (status) {
    case 'running': return 'text-zinc-400';
    case 'completed': return 'text-zinc-500';
    case 'failed': return 'text-red-400';
    case 'cancelled': return 'text-zinc-600';
    case 'queued': return 'text-zinc-600';
    default: return 'text-zinc-500';
  }
}

function parseISOTime(s) {
  if (!s) return null;
  const t = new Date(s);
  if (isNaN(t.getTime())) return null;
  return t;
}

function fmtRelativeTime(iso) {
  const t = parseISOTime(iso);
  if (!t) return '\u2014';
  const sec = Math.floor((Date.now() - t.getTime()) / 1000);
  if (sec < 5) return 'just now';
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  return `${day}d ago`;
}

function metaContext() {
  const o = state.overview || {};
  const s = state.metaStatus || {};
  const generatedAt = o.meta_generated_at || s.finished_at || '';
  const stale = !!o.meta_stale;
  const refreshing = !!o.meta_refreshing || !!s.refreshing;
  const backend = o.meta_backend || s.backend || 'scan-fallback';
  const ttlMS = s.refresh_ttl_ms || 0;
  return { generatedAt, stale, refreshing, backend, ttlMS, lastError: o.meta_last_error || s.last_error || '' };
}

function renderMetaSummaryLine() {
  const m = metaContext();
  const bits = [];
  bits.push(`meta:${m.backend}`);
  bits.push(`updated:${fmtRelativeTime(m.generatedAt)}`);
  if (m.ttlMS > 0) bits.push(`ttl:${Math.round(m.ttlMS / 1000)}s`);
  bits.push(`stale:${m.stale ? 'yes' : 'no'}`);
  if (m.refreshing) bits.push('refreshing');
  if (m.lastError) bits.push(`error:${m.lastError}`);
  return bits.join(' · ');
}

function updateHeaderMetaChip() {
  if (!isDashboard) return;
  const chip = $('header-meta');
  const btn = $('header-meta-refresh');
  if (!chip || !btn) return;
  chip.classList.remove('hidden');
  btn.classList.remove('hidden');
  chip.textContent = renderMetaSummaryLine();
}

async function refreshDashboardMeta(force = false) {
  if (!isDashboard) return;
  const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';
  try {
    await apiMetaRefresh(crawl, force);
  } catch (_) {
    // Ignore; status line shows last known error state from /api/meta/status.
  }
  await refreshDashboardContext();
}

async function refreshDashboardContext() {
  if (!isDashboard) return;
  const crawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';
  const [metaStatus, overview] = await Promise.all([
    apiMetaStatus(crawl).catch(() => null),
    apiOverview().catch(() => null),
  ]);
  if (metaStatus) state.metaStatus = metaStatus;
  if (overview) {
    state.overview = overview;
    state.overviewLoadedAt = Date.now();
  }
  if (state.overview && state.overview.meta_stale && !state.overview.meta_refreshing) {
    await apiMetaRefresh(crawl, false).catch(() => {});
  }
  updateHeaderMetaChip();
}

let metaWatchdogTimer = null;
function startMetaWatchdog() {
  if (!isDashboard) return;
  if (metaWatchdogTimer) clearInterval(metaWatchdogTimer);
  const tick = () => refreshDashboardContext().catch(() => {});
  tick();
  metaWatchdogTimer = setInterval(tick, 20000);
}

// ===================================================================
// Tab 1: Overview
// ===================================================================
async function renderOverview() {
  state.currentPage = 'overview';
  const main = $('main');

function countActive(jobs) {
  return jobs.filter(j => j.status === 'running' || j.status === 'queued').length;
}

function renderJobList(jobs) {
  const active = jobs.filter(j => j.status === 'running' || j.status === 'queued');
  if (active.length === 0) return '';
  return active.map(j => renderJobItem(j)).join('');
}

function renderJobItem(j) {
  const pct = Math.round((j.progress || 0) * 100);
  const rateStr = j.rate > 0 ? ` &middot; ${j.rate.toFixed(0)} docs/s` : '';
  const cancelBtn = (j.status === 'running' || j.status === 'queued')
    ? `<button onclick="cancelJob('${esc(j.id)}')" class="text-xs text-zinc-500 hover:text-red-400 transition-colors ml-2">cancel</button>`
    : '';
  return `
    <div class="mb-2 py-2 border-b border-zinc-100 dark:border-zinc-800/60" id="job-${esc(j.id)}">
      <div class="flex items-center justify-between mb-1">
        <span class="text-xs font-mono text-zinc-500">${esc(j.id)} &middot; <span class="${statusClass(j.status)}">${esc(j.status)}</span>${rateStr}</span>
        <span class="text-xs font-mono text-zinc-500">${pct}%${cancelBtn}</span>
      </div>
      <div class="progress-track mb-1">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="text-xs text-zinc-500 truncate">${esc(j.message || '')}</div>
    </div>`;
}

function renderJobHistory(jobs) {
  if (!jobs || jobs.length === 0) {
    return '<div class="text-xs font-mono text-zinc-500">No jobs yet.</div>';
  }

  return `

              <td class="px-4 py-2 font-mono text-xs text-right text-zinc-500">${fmtDuration(j.started_at, j.ended_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function submitJob(event, type) {
  event.preventDefault();
  const form = event.target;
  const files = form.elements.files ? form.elements.files.value : '0';

  const cfg = { type, files };

  if (type === 'markdown') {
    cfg.fast = form.elements.fast ? form.elements.fast.checked : false;
  } else if (type === 'pack') {
    cfg.format = form.elements.format ? form.elements.format.value : 'parquet';
  } else if (type === 'index') {
    cfg.engine = form.elements.engine ? form.elements.engine.value : 'duckdb';
    cfg.source = form.elements.source ? form.elements.source.value : 'files';
  }

  startJob(cfg);
  return false;
}

async function startJob(cfg) {
  try {
    const job = await apiCreateJob(cfg);
    // Add to state
    if (!state.jobs) state.jobs = [];
    state.jobs.unshift(job);

    // Subscribe to updates
    wsClient.subscribe(job.id, (msg) => onJobUpdate(msg));

    // Re-render the pipeline page if still on it
    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    }
  } catch (e) {
    alert('Failed to start job: ' + e.message);
  }
}

async function cancelJob(id) {
  try {
    await apiCancelJob(id);
    // Update local state
    const job = state.jobs && state.jobs.find(j => j.id === id);
    if (job) {
      job.status = 'cancelled';
      job.ended_at = new Date().toISOString();
    }
    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    }
  } catch (e) {
    alert('Failed to cancel job: ' + e.message);
  }
}

function onJobUpdate(msg) {
  if (!state.jobs) return;
  const job = state.jobs.find(j => j.id === msg.job_id);
  if (!job) return;

  if (msg.type === 'job_progress') {
    job.progress = msg.progress;
    job.message = msg.message;
    job.rate = msg.rate || 0;

    // Update in-place if on pipeline page
    if (state.currentPage === 'pipeline') {
      updateJobInPlace(job);
    }
  } else if (msg.type === 'job_update') {
    job.status = msg.status;
    if (msg.error) job.error = msg.error;
    if (msg.status === 'completed' || msg.status === 'failed' || msg.status === 'cancelled') {
      job.ended_at = new Date().toISOString();
      if (msg.status === 'completed') job.progress = 1.0;
    }

    if (state.currentPage === 'pipeline') {
      renderPipelineContent();
    }
  }
}

function updateJobInPlace(job) {
  const el = $('job-' + job.id);
  if (!el) return;
  const pct = Math.round((job.progress || 0) * 100);
  const rateStr = job.rate > 0 ? ` &middot; ${job.rate.toFixed(0)} docs/s` : '';
  const cancelBtn = (job.status === 'running' || job.status === 'queued')
    ? `<button onclick="cancelJob('${esc(job.id)}')" class="text-xs text-zinc-500 hover:text-red-400 transition-colors ml-2">cancel</button>`
    : '';

  el.innerHTML = `
    <div class="flex items-center justify-between mb-1">
      <span class="text-xs font-mono text-zinc-500">${esc(job.id)} &middot; <span class="${statusClass(job.status)}">${esc(job.status)}</span>${rateStr}</span>
      <span class="text-xs font-mono text-zinc-500">${pct}%${cancelBtn}</span>
    </div>
    <div class="progress-track mb-1">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="text-xs text-zinc-500 truncate">${esc(job.message || '')}</div>`;
}

function setupPipelineWS() {
  // Subscribe to all job updates with wildcard
  wsClient.subscribe('*', (msg) => onJobUpdate(msg));
}

  setTimeout(() => { const i = $('home-search-input'); if (i) i.focus(); }, 50);
}

async function loadHomeStats() {
  const el = $('home-stats');
  if (!el) return;
  try {
    const d = await apiStats(currentSearchEngine());
    state.stats = d;
    if (d.engine) state.searchEngine = d.engine;
    syncSearchEngineControls();
    el.innerHTML = `<span class="text-xs font-mono text-zinc-400 dark:text-zinc-500">${esc(d.engine)} &middot; ${(d.total_docs||0).toLocaleString()} docs &middot; ${d.shards||0} shards &middot; ${d.total_disk||'\u2014'}</span>`;
  } catch(e) {
    el.innerHTML = `<span class="text-xs font-mono text-zinc-400 dark:text-zinc-500">No index yet. Run <code class="text-zinc-300 dark:text-zinc-400">search cc fts index</code> to get started.</span>`;
  }
}

function doSearch(query) {
  if (!query.trim()) return;
  state.query = query.trim();
  navigateTo(buildSearchURL(state.query, 0));
}

async function doSearchWithRender(query, offset = 0, engine = '') {
  if (!query.trim()) { renderSearchHome(); return; }
  if (engine) state.searchEngine = engine;
  await ensureEnginesLoaded();
  state.query = query.trim();
  state.loading = true;
  state.currentPage = 'search';
  syncSearchEngineControls();
  renderSearchLoading();

  try {
    const data = await apiSearch(query, 20, offset, currentSearchEngine());
    if (data.engine) state.searchEngine = data.engine;
    syncSearchEngineControls();
    state.results = data;
    state.loading = false;
    renderSearchResults(data, query, offset);
  } catch (err) {
    state.loading = false;
    renderError('Search failed: ' + err.message);
  }
}

function renderSearchLoading() {
  const lines = Array(6).fill('').map((_, i) => `
    <div class="py-6 anim-fade-up" style="animation-delay:${i*40}ms">
      <div class="h-4 w-2/5 bg-zinc-100 dark:bg-zinc-900 mb-2"></div>
      <div class="h-3 w-1/3 bg-zinc-100 dark:bg-zinc-900 mb-3"></div>
      <div class="h-3 w-full bg-zinc-50 dark:bg-zinc-900/60 mb-1"></div>
      <div class="h-3 w-4/5 bg-zinc-50 dark:bg-zinc-900/60"></div>
    </div>`).join('<div class="border-t border-zinc-100 dark:border-zinc-800/60"></div>');
  $('main').innerHTML = `<div class="py-8 max-w-3xl mx-auto">${lines}</div>`;
}

function renderSearchResults(data, query, offset) {
  if (!data || !data.hits || data.hits.length === 0) {
    $('main').innerHTML = `
      <div class="py-20 text-center anim-fade-in max-w-3xl mx-auto">
        <p class="text-zinc-500 dark:text-zinc-400 text-sm mb-1">Nothing matched <strong class="text-zinc-700 dark:text-zinc-300">&laquo;${esc(query)}&raquo;</strong></p>
        <p class="text-zinc-400 dark:text-zinc-500 text-xs">Try different terms or broaden your query</p>
      </div>`;
    return;
  }

  const pageSize = 20;
  const page = Math.floor(offset / pageSize) + 1;
  const totalPages = Math.ceil((data.total || data.hits.length) / pageSize);

  const results = data.hits.map((hit, i) => `
    <a href="#/doc/${hit.shard || '00000'}/${encodeURIComponent(hit.doc_id)}"
       class="block result-item py-6 -mx-2 px-2 cursor-pointer anim-fade-up"
       style="animation-delay:${i * 30}ms">
      <div class="flex items-baseline justify-between gap-4 mb-1">
        <span class="text-base font-medium truncate">${esc(docTitle(hit.doc_id))}</span>
        <span class="text-xs font-mono text-zinc-500 shrink-0">${hit.score ? hit.score.toFixed(2) : ''}</span>
      </div>
      <div class="text-xs font-mono text-zinc-500 dark:text-zinc-600 mb-2">${esc(hit.shard || '')} &middot; ${esc(hit.doc_id)}</div>
      ${hit.snippet ? `<p class="text-sm text-zinc-500 dark:text-zinc-400 leading-relaxed line-clamp-3">${highlight(hit.snippet, query)}</p>` : ''}
    </a>`).join('<div class="border-t border-zinc-100 dark:border-zinc-800/60"></div>');

  $('main').innerHTML = `
    <div class="py-8 max-w-3xl mx-auto anim-fade-in">
      <div class="text-xs font-mono text-zinc-400 dark:text-zinc-500 mb-6">
        ${(data.total || data.hits.length).toLocaleString()} results${data.elapsed_ms ? ` &middot; ${data.elapsed_ms}ms` : ''}${data.shards ? ` &middot; ${data.shards} shard${data.shards!==1?'s':''}` : ''}${data.engine ? ` &middot; ${esc(data.engine)}` : ''}
      </div>
      <div>${results}</div>
      ${totalPages > 1 ? renderSearchPagination(page, totalPages, query, pageSize, data.engine || currentSearchEngine()) : ''}
    </div>`;
}

function renderSearchPagination(cur, total, query, pageSize, engine) {
  let pages = [];
  if (total <= 7) {
    for (let i = 1; i <= total; i++) pages.push(i);
  } else {
    pages.push(1);
    if (cur > 3) pages.push('\u2026');
    for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) pages.push(i);
    if (cur < total - 2) pages.push('\u2026');
    pages.push(total);
  }

  const btn = (p, active) => {
    if (p === '\u2026') return `<span class="px-2 py-1 text-xs text-zinc-400">\u2026</span>`;
    const cls = active
      ? 'px-2 py-1 text-xs font-mono font-medium text-zinc-950 dark:text-zinc-50'
      : 'px-2 py-1 text-xs font-mono text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-50 transition-colors';
    const params = new URLSearchParams({ q: query, offset: String((p-1)*pageSize), engine: engine || currentSearchEngine() });
    return `<a href="#/search?${params.toString()}" class="${cls}">${p}</a>`;
  };

  const prevParams = new URLSearchParams({ q: query, offset: String((cur-2)*pageSize), engine: engine || currentSearchEngine() });
  const nextParams = new URLSearchParams({ q: query, offset: String(cur*pageSize), engine: engine || currentSearchEngine() });
  return `
    <div class="flex items-center justify-center gap-1 pt-8 pb-4">
      ${cur > 1 ? `<a href="#/search?${prevParams.toString()}" class="text-xs font-mono text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-50 transition-colors mr-2">&larr; prev</a>` : ''}
      ${pages.map(p => btn(p, p === cur)).join('')}
      ${cur < total ? `<a href="#/search?${nextParams.toString()}" class="text-xs font-mono text-zinc-400 hover:text-zinc-950 dark:hover:text-zinc-50 transition-colors ml-2">next &rarr;</a>` : ''}
    </div>`;
}

function renderCrawlsContent(crawls) {
  const el = $('crawls-content');
  if (!el) return;

  if (!crawls || crawls.length === 0) {
    el.innerHTML = '<div class="text-xs font-mono text-zinc-500">No crawls found.</div>';
    return;
  }
  const activeCrawl = state.overview && state.overview.crawl_id ? state.overview.crawl_id : '';

  el.innerHTML = `
    <div class="border border-zinc-200 dark:border-zinc-800">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-zinc-200 dark:border-zinc-800">
            <th class="text-left px-4 py-2 text-xs font-mono text-zinc-500 font-normal">Crawl ID</th>
            <th class="text-left px-4 py-2 text-xs font-mono text-zinc-500 font-normal">Name</th>
            <th class="text-left px-4 py-2 text-xs font-mono text-zinc-500 font-normal">From</th>
            <th class="text-left px-4 py-2 text-xs font-mono text-zinc-500 font-normal">To</th>
            <th class="text-right px-4 py-2 text-xs font-mono text-zinc-500 font-normal">Status</th>
          </tr>
        </thead>
        <tbody>
          ${crawls.map((c, i) => `
            <tr class="border-b border-zinc-100 dark:border-zinc-800/60 anim-fade-up" style="animation-delay:${i * 20}ms">
              <td class="px-4 py-2 font-mono text-xs">${esc(c.id || '')}</td>
              <td class="px-4 py-2 text-xs">${esc(c.name || '')}</td>
              <td class="px-4 py-2 font-mono text-xs text-zinc-500">${formatCrawlDate(c.from)}</td>
              <td class="px-4 py-2 font-mono text-xs text-zinc-500">${formatCrawlDate(c.to)}</td>
              <td class="px-4 py-2 text-right text-xs font-mono ${c.id === activeCrawl ? 'text-zinc-300' : 'text-zinc-500'}">${c.id === activeCrawl ? 'active' : ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="text-xs font-mono text-zinc-500 mt-3">${crawls.length} crawls total</div>`;
}

function formatCrawlDate(d) {
  if (!d) return '\u2014';
  // d could be ISO string or time.Time JSON
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return esc(String(d));
    return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  } catch {
    return esc(String(d));
  }
}

// ===================================================================
// Error renderer
// ===================================================================
function renderError(msg) {
  $('main').innerHTML = `<div class="py-16 text-center anim-fade-in"><p class="text-red-400 text-sm">${esc(msg)}</p></div>`;
}

// ===================================================================
// Keyboard Shortcuts
// ===================================================================
document.addEventListener('keydown', (e) => {
  const isInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);

  // Cmd+K — focus search input
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const h = $('header-search-input');
    const home = $('home-search-input');
    if (home && !home.closest('.hidden')) { home.focus(); home.select(); }
    else if (h && !h.closest('.hidden')) { h.focus(); h.select(); }
    else {
      // Navigate to search tab if not there
      navigateTo('/search');
    }
  }

  // / — focus search (when not in input)
  if (e.key === '/' && !isInput) {
    e.preventDefault();
    const h = $('header-search-input');
    const home = $('home-search-input');
    if (home && !home.closest('.hidden')) home.focus();
    else if (h && !h.closest('.hidden')) h.focus();
    else navigateTo('/search');
  }

  // Escape — blur active input
  if (e.key === 'Escape') document.activeElement.blur();

  // Number keys — switch tabs (when not in input)
  if (!isInput && e.key >= '1' && e.key <= '5' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    const tabs = isDashboard
      ? ['/', '/pipeline', '/search', '/browse', '/crawls']
      : ['/search', '/browse'];
    const idx = parseInt(e.key) - 1;
    if (idx >= 0 && idx < tabs.length) {
      e.preventDefault();
      navigateTo(tabs[idx]);
    }
  }
});
