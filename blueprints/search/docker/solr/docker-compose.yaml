services:
  solr:
    image: solr:9.7
    ports:
      - "8983:8983"
    command: solr-precreate gettingstarted
    volumes:
      - solr_data:/var/solr
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8983/solr/admin/info/system?wt=json"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  solr_data:
