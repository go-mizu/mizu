<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — markdown.go-mizu</title>
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="stylesheet" href="/styles.css">
  <style>
/* Prose rendered from markdown */
#prev-out h1{font-size:1.6em;font-weight:600;margin-bottom:1rem;letter-spacing:-.02em;color:#18181b}
#prev-out h2{font-size:1.3em;font-weight:600;margin:1.5rem 0 .75rem;color:#18181b}
#prev-out h3{font-size:1.1em;font-weight:600;margin:1.25rem 0 .625rem;color:#18181b}
#prev-out h4,#prev-out h5,#prev-out h6{font-weight:600;margin:1rem 0 .5rem;color:#18181b}
#prev-out p{color:#71717a;line-height:1.75;margin-bottom:.875rem}
#prev-out ul,#prev-out ol{padding-left:1.5rem;margin-bottom:.875rem}
#prev-out li{line-height:1.7;color:#71717a}
#prev-out code{font-family:'Geist Mono',ui-monospace,monospace;font-size:.75rem;background:#f4f4f5;padding:.125rem .375rem;color:#3f3f46}
#prev-out pre{background:#09090b;padding:1.25rem;overflow-x:auto;margin-bottom:1rem}
#prev-out pre code{background:none;padding:0;color:#e4e4e7;font-size:.8125rem}
#prev-out blockquote{padding-left:1rem;color:#a1a1aa;margin-bottom:.875rem}
#prev-out a{color:#18181b;text-decoration:underline;text-underline-offset:2px;text-decoration-color:#d4d4d8}
#prev-out a:hover{text-decoration-color:#18181b}
#prev-out table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:.875rem}
#prev-out th,#prev-out td{padding:.5rem .75rem;text-align:left;color:#71717a}
#prev-out th{background:#f4f4f5;font-weight:600;color:#18181b}
#prev-out hr{border:none;margin:1.5rem 0}
#prev-out img{max-width:100%;height:auto}

.dark #prev-out h1,.dark #prev-out h2,.dark #prev-out h3,.dark #prev-out h4,.dark #prev-out h5,.dark #prev-out h6{color:#f4f4f5}
.dark #prev-out p,.dark #prev-out li{color:#a1a1aa}
.dark #prev-out code{background:#18181b;color:#d4d4d8}
.dark #prev-out th{background:#18181b;color:#f4f4f5}
.dark #prev-out td{color:#a1a1aa}
.dark #prev-out a{color:#f4f4f5;text-decoration-color:#3f3f46}
.dark #prev-out a:hover{text-decoration-color:#f4f4f5}
.dark #prev-out blockquote{color:#52525b}
  </style>
</head>
<body class="font-sans bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-200">

<!-- Top bar — sticky -->
<div class="sticky top-0 z-50 bg-white dark:bg-zinc-950 px-5 py-2.5 flex items-center gap-3 transition-colors duration-200">
  <a href="/" class="flex items-center text-zinc-900 dark:text-zinc-100 flex-shrink-0 no-underline" title="markdown.go-mizu">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M8 16V8.5a.5.5 0 0 1 .9-.3l2.7 3.6a.5.5 0 0 0 .8 0l2.7-3.6a.5.5 0 0 1 .9.3V16"/>
    </svg>
  </a>
  <form class="flex flex-1 max-w-preview" id="form" onsubmit="handleSubmit(event)">
    <input id="url-in" type="url" class="flex-1 font-mono text-sm px-3.5 py-2.5 border border-zinc-200 dark:border-zinc-800 border-r-0 bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 outline-none focus:border-zinc-900 dark:focus:border-zinc-100 min-w-0 transition-colors placeholder:text-zinc-400 dark:placeholder:text-zinc-600" placeholder="https://example.com" autocomplete="off" spellcheck="false">
    <button type="submit" id="sub-btn" class="font-sans text-sm font-medium px-5 py-2.5 bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 whitespace-nowrap hover:opacity-85 disabled:opacity-50 disabled:cursor-default transition-opacity cursor-pointer border-none">
      <span id="btn-t">Convert</span>
    </button>
  </form>
  <button onclick="toggleTheme()" title="Toggle dark mode" class="text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 p-1.5 transition-colors ml-auto cursor-pointer bg-transparent border-none flex items-center flex-shrink-0">
    <svg class="dark:hidden" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
    <svg class="hidden dark:block" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
  </button>
</div>

<!-- Empty state -->
<div id="empty-state" style="display:none" class="flex flex-col items-center py-24 px-8 text-center">
  <svg class="w-11 h-11 mb-5 text-zinc-400 dark:text-zinc-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <path d="M8 16V8.5a.5.5 0 0 1 .9-.3l2.7 3.6a.5.5 0 0 0 .8 0l2.7-3.6a.5.5 0 0 1 .9.3V16"/>
  </svg>
  <p class="text-sm text-zinc-400 mb-3.5">Enter a URL above to preview its Markdown output.</p>
  <p class="text-sm text-zinc-400">Try:
    <span class="text-zinc-500 dark:text-zinc-400 cursor-pointer underline decoration-zinc-300 dark:decoration-zinc-700 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors" onclick="setPreviewEg('https://example.com')">example.com</span>
    <span class="mx-1 opacity-50">·</span>
    <span class="text-zinc-500 dark:text-zinc-400 cursor-pointer underline decoration-zinc-300 dark:decoration-zinc-700 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors" onclick="setPreviewEg('https://news.ycombinator.com')">news.ycombinator.com</span>
    <span class="mx-1 opacity-50">·</span>
    <span class="text-zinc-500 dark:text-zinc-400 cursor-pointer underline decoration-zinc-300 dark:decoration-zinc-700 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors" onclick="setPreviewEg('https://docs.python.org/3/')">docs.python.org</span>
  </p>
</div>

<!-- Loading state -->
<div id="loading-state" style="display:none" class="flex flex-col items-center py-20 px-8 gap-3.5">
  <span class="inline-block w-5 h-5 rounded-full border-2 border-zinc-200 dark:border-zinc-700 border-t-zinc-900 dark:border-t-zinc-100 animate-spin"></span>
  <span class="text-sm text-zinc-400">Converting…</span>
</div>

<!-- Error state -->
<div id="error-state" style="display:none" class="px-8 py-9">
  <div id="err-msg" class="max-w-page mx-auto bg-zinc-50 dark:bg-zinc-900 px-5 py-4 text-sm text-zinc-500 dark:text-zinc-400"></div>
</div>

<!-- Result state -->
<div id="result-state" style="display:none">
  <!-- Meta bar -->
  <div class="w-full px-8 py-2.5 bg-white dark:bg-zinc-950">
    <div class="max-w-page mx-auto flex items-center gap-2.5">
      <span id="r-title" class="flex-1 text-sm font-medium truncate text-zinc-900 dark:text-zinc-100"></span>
      <span id="r-method" class="font-mono text-2xs px-1.5 py-0.5 bg-zinc-100 dark:bg-zinc-900 text-zinc-500 dark:text-zinc-400 whitespace-nowrap"></span>
      <span id="r-dur" class="font-mono text-2xs px-1.5 py-0.5 bg-zinc-100 dark:bg-zinc-900 text-zinc-500 dark:text-zinc-400 whitespace-nowrap"></span>
      <span id="r-tok" style="display:none" class="font-mono text-2xs px-1.5 py-0.5 bg-zinc-100 dark:bg-zinc-900 text-zinc-500 dark:text-zinc-400 whitespace-nowrap"></span>
      <a id="r-raw" href="#" target="_blank" rel="noopener" class="text-sm text-zinc-400 whitespace-nowrap underline underline-offset-2 decoration-zinc-300 dark:decoration-zinc-700 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors no-underline" style="text-decoration:underline">raw ↗</a>
    </div>
  </div>
  <!-- Tab bar -->
  <div class="w-full px-8 bg-white dark:bg-zinc-950">
    <div class="max-w-page mx-auto flex items-center justify-between">
      <div class="flex">
        <button id="tab-md" onclick="switchTab('md')" class="text-sm px-4 py-2.5 border-b-2 border-zinc-900 dark:border-zinc-100 text-zinc-900 dark:text-zinc-100 font-sans cursor-pointer bg-transparent border-t-0 border-l-0 border-r-0 transition-colors">Markdown</button>
        <button id="tab-pv" onclick="switchTab('pv')" class="text-sm px-4 py-2.5 border-b-2 border-transparent text-zinc-400 font-sans cursor-pointer bg-transparent border-t-0 border-l-0 border-r-0 transition-colors">Preview</button>
      </div>
      <div class="flex gap-2">
        <button onclick="copyMd()" class="font-sans text-sm px-3.5 py-1.5 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 border-none cursor-pointer hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors"><span id="copy-lbl">Copy</span></button>
        <button onclick="saveMd()" class="font-sans text-sm px-3.5 py-1.5 bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 border-none cursor-pointer hover:bg-zinc-200 dark:hover:bg-zinc-800 transition-colors">Save .md</button>
      </div>
    </div>
  </div>
  <!-- Panels -->
  <div id="panel-md" class="px-8 py-9 bg-white dark:bg-zinc-950">
    <div class="max-w-page mx-auto"><pre id="md-out" class="font-mono text-code-out leading-body whitespace-pre-wrap text-zinc-900 dark:text-zinc-100"></pre></div>
  </div>
  <div id="panel-pv" style="display:none" class="px-8 py-9 bg-white dark:bg-zinc-950">
    <div class="max-w-2xl mx-auto"><div id="prev-out"></div></div>
  </div>
</div>

<script>
var md = '';
var currentUrl = '';

function handleSubmit(e) {
  e.preventDefault();
  var url = document.getElementById('url-in').value.trim();
  if (!url) return;
  history.replaceState(null, '', '/preview?url=' + encodeURIComponent(url));
  convertUrl(url);
}

function setPreviewEg(url) {
  document.getElementById('url-in').value = url;
  convertUrl(url);
}

function setLoading(v) {
  document.getElementById('sub-btn').disabled = v;
  document.getElementById('btn-t').textContent = v ? 'Converting…' : 'Convert';
  document.getElementById('loading-state').style.display = v ? 'flex' : 'none';
  document.getElementById('empty-state').style.display = 'none';
}

async function convertUrl(url) {
  currentUrl = url;
  document.getElementById('url-in').value = url;
  document.getElementById('error-state').style.display = 'none';
  document.getElementById('result-state').style.display = 'none';
  setLoading(true);
  try {
    var r = await fetch('/convert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: url})
    });
    if (!r.ok) {
      var j = await r.json().catch(function() { return {error: 'Conversion failed'}; });
      throw new Error(j.error || 'HTTP ' + r.status);
    }
    showResult(await r.json());
  } catch(e) {
    document.getElementById('err-msg').textContent = e.message || 'Conversion failed';
    document.getElementById('error-state').style.display = 'block';
  } finally {
    setLoading(false);
  }
}

function showResult(data) {
  md = (data.markdown || '').replace(/^[-*_]{3,}\s*$/gm, '').replace(/\n{3,}/g, '\n\n').trim();
  document.getElementById('r-title').textContent = data.title || currentUrl;
  document.getElementById('r-method').textContent = data.method || '';
  document.getElementById('r-dur').textContent = data.durationMs + 'ms';
  var tb = document.getElementById('r-tok');
  if (data.tokens) { tb.textContent = '~' + data.tokens.toLocaleString() + ' tok'; tb.style.display = ''; }
  else { tb.style.display = 'none'; }
  document.getElementById('r-raw').href = '/' + currentUrl;
  document.getElementById('md-out').textContent = md;
  var parsed = marked.parse(md);
  if (typeof parsed !== 'string') return;
  document.getElementById('prev-out').innerHTML = DOMPurify.sanitize(parsed);
  document.getElementById('result-state').style.display = 'block';
  switchTab('md');
}

function switchTab(t) {
  var mdTab = document.getElementById('tab-md');
  var pvTab = document.getElementById('tab-pv');
  var mdPanel = document.getElementById('panel-md');
  var pvPanel = document.getElementById('panel-pv');
  var base = 'text-sm px-4 py-2.5 border-b-2 font-sans cursor-pointer bg-transparent border-t-0 border-l-0 border-r-0 transition-colors ';
  mdTab.className = base + (t==='md' ? 'border-zinc-900 dark:border-zinc-100 text-zinc-900 dark:text-zinc-100' : 'border-transparent text-zinc-400');
  pvTab.className = base + (t==='pv' ? 'border-zinc-900 dark:border-zinc-100 text-zinc-900 dark:text-zinc-100' : 'border-transparent text-zinc-400');
  mdPanel.style.display = t === 'md' ? '' : 'none';
  pvPanel.style.display = t === 'pv' ? '' : 'none';
}

async function copyMd() {
  try { await navigator.clipboard.writeText(md); }
  catch(e) {
    var ta = document.createElement('textarea');
    ta.value = md; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  var el = document.getElementById('copy-lbl');
  el.textContent = 'Copied!';
  setTimeout(function() { el.textContent = 'Copy'; }, 2000);
}

function saveMd() {
  var blob = new Blob([md], {type: 'text/markdown'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var title = document.getElementById('r-title').textContent || 'document';
  a.download = title.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').toLowerCase() + '.md';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(a.href); }, 100);
}

function toggleTheme() {
  var isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

window.addEventListener('load', function() {
  var params = new URLSearchParams(window.location.search);
  var url = params.get('url');
  if (url) { convertUrl(url); }
  else { document.getElementById('empty-state').style.display = 'flex'; }
});
</script>
</body>
</html>
