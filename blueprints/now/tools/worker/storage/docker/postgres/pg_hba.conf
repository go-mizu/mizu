# ── PostgreSQL Host-Based Authentication (pg_hba.conf) ───────────────
#
# TYPE  DATABASE  USER      ADDRESS         METHOD
#
# Local unix socket — trust for postgres superuser (container admin only)
local   all       postgres                  peer

# Local unix socket — SCRAM for app user
local   all       all                       scram-sha-256

# Loopback (container-internal, PgBouncer)
host    all       all       127.0.0.1/32    scram-sha-256
host    all       all       ::1/128         scram-sha-256

# Docker network (172.16.0.0/12 covers default Docker bridge + custom nets)
hostssl all       all       172.16.0.0/12   scram-sha-256

# External connections — require SSL + SCRAM-SHA-256
hostssl all       all       0.0.0.0/0       scram-sha-256
hostssl all       all       ::/0            scram-sha-256

# Reject anything else
host    all       all       0.0.0.0/0       reject
host    all       all       ::/0            reject
